<script>
// ===== FUNGSI DASAR =====
function getDataAkun() {
    var data = localStorage.getItem('2r_akun');
    if (data) {
        return JSON.parse(data);
    } else {
        return [];
    }
}

function simpanDataAkun(akun) {
    localStorage.setItem('2r_akun', JSON.stringify(akun));
}

function encodePassword(password) {
    return btoa(password);
}

function decodePassword(encoded) {
    return atob(encoded);
}

function inisialisasiSuperAdmin() {
    var akun = getDataAkun();
    var adaSuperAdmin = false;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].role === 'superadmin') {
            adaSuperAdmin = true;
            break;
        }
    }
    if (!adaSuperAdmin) {
        var superAdmin = {
            id: 'SA-001',
            role: 'superadmin',
            username: 'admin',
            password: encodePassword('admin123'),
            nama: 'SuperAdmin',
            email: 'admin@2r.com',
            hp: '081234567890',
            alamat: 'Kantor Pusat',
            bank: '',
            rekening: '',
            pemilikRek: '',
            status: 'AKTIF',
            registeredAt: new Date().toISOString()
        };
        akun.push(superAdmin);
        simpanDataAkun(akun);
    }
}

function generateId(role) {
    var akun = getDataAkun();
    var daftarRole = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].role === role) {
            daftarRole.push(akun[i]);
        }
    }
    var urut = 1;
    for (var j = 0; j < daftarRole.length; j++) {
        var parts = daftarRole[j].id.split('-');
        if (parts.length === 2) {
            var nomor = parseInt(parts[1]);
            if (nomor >= urut) {
                urut = nomor + 1;
            }
        }
    }
    var prefix = '';
    if (role === 'customer') {
        prefix = 'CUST';
    } else if (role === 'toko') {
        prefix = 'TOKO';
    } else if (role === 'ojek') {
        prefix = 'OJEK';
    } else if (role === 'pedagang') {
        prefix = 'PEDAGANG';
    } else if (role === 'codseller') {
        prefix = 'COD';
    } else if (role === 'superadmin') {
        prefix = 'SA';
    } else if (role === 'staf_admin') {
        prefix = 'STA';
    } else if (role === 'staf_owner_ojek') {
        prefix = 'SOO';
    } else if (role === 'staf_owner_toko') {
        prefix = 'SOT';
    } else if (role === 'customer_service') {
        prefix = 'CS';
    } else if (role === 'sponsor') {
        prefix = 'SPN';
    } else {
        prefix = 'USR';
    }
    return prefix + '-' + String(urut).padStart(3, '0');
}

function tampilkanToast(pesan, tipe) {
    if (!tipe) {
        tipe = 'success';
    }
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + tipe;
    var icon = '';
    if (tipe === 'success') {
        icon = 'fa-check-circle';
    } else if (tipe === 'error') {
        icon = 'fa-times-circle';
    } else if (tipe === 'warning') {
        icon = 'fa-exclamation-triangle';
    } else {
        icon = 'fa-info-circle';
    }
    toast.innerHTML = '<i class="fas ' + icon + '"></i> ' + pesan;
    container.appendChild(toast);
    setTimeout(function() {
        toast.style.animation = 'slideInRight 0.3s ease reverse';
        setTimeout(function() {
            toast.remove();
        }, 300);
    }, 3500);
}

function bukaModal(id) {
    var modal = document.getElementById(id);
    if (modal) {
        modal.classList.add('active');
    }
}

function tutupModal(id) {
    var modal = document.getElementById(id);
    if (modal) {
        modal.classList.remove('active');
    }
}
</script>

<script>
function toggleForm(tipe) {
    document.getElementById('authError').style.display = 'none';
    if (tipe === 'register') {
        document.getElementById('loginForm').classList.add('hidden-form');
        document.getElementById('registerForm').classList.remove('hidden-form');
    } else {
        document.getElementById('registerForm').classList.add('hidden-form');
        document.getElementById('loginForm').classList.remove('hidden-form');
    }
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('loginUsername').value.trim();
    var password = document.getElementById('loginPassword').value.trim();
    var akun = getDataAkun();
    var user = null;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].username === username && decodePassword(akun[i].password) === password) {
            user = akun[i];
            break;
        }
    }
    if (user) {
        if (user.status !== 'AKTIF' && user.role !== 'superadmin') {
            document.getElementById('authError').style.display = 'block';
            document.getElementById('authErrorText').textContent = 'Akun belum aktif. Menunggu verifikasi admin.';
            return;
        }
        localStorage.setItem('2r_user', JSON.stringify(user));
        localStorage.setItem('2r_user_role', user.role);
        tampilkanDashboard(user);
    } else {
        document.getElementById('authError').style.display = 'block';
        document.getElementById('authErrorText').textContent = 'Username atau password salah!';
    }
});

document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var role = document.getElementById('regRole').value;
    var username = document.getElementById('regUsername').value.trim();
    var password = document.getElementById('regPassword').value.trim();
    var nama = document.getElementById('regNama').value.trim();
    if (!role || !username || !password || !nama) {
        alert('Data belum lengkap!');
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].username === username) {
            alert('Username sudah digunakan!');
            return;
        }
    }
    var statusAkun = '';
    if (role === 'toko' || role === 'ojek') {
        statusAkun = 'NONAKTIF (Menunggu Verifikasi)';
    } else {
        statusAkun = 'AKTIF';
    }
    var akunBaru = {
        id: generateId(role),
        role: role,
        username: username,
        password: encodePassword(password),
        nama: nama,
        email: '',
        hp: '',
        alamat: '',
        bank: '',
        rekening: '',
        pemilikRek: '',
        status: statusAkun,
        registeredAt: new Date().toISOString()
    };
    akun.push(akunBaru);
    simpanDataAkun(akun);
    alert('Akun berhasil dibuat! ID: ' + akunBaru.id + '\nStatus: ' + statusAkun);
    toggleForm('login');
});
</script>

// Fungsi preview KTP customer
function previewKTPCustomer(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('ktpPreviewCustomer').innerHTML = '<img src="' + e.target.result + '" class="preview-img">';
        localStorage.setItem('2r_ktp_temp_customer', e.target.result);
    };
    reader.readAsDataURL(file);
}

// Fungsi simpan KTP customer
function simpanKTPCustomer() {
    var ktp = localStorage.getItem('2r_ktp_temp_customer');
    if (!ktp) { tampilkanToast('Upload KTP dulu!', 'warning'); return; }
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.ktp = ktp;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) { akun[i].ktp = ktp; break; }
    }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    localStorage.removeItem('2r_ktp_temp_customer');
    tampilkanToast('KTP disimpan!', 'success');
}

        if (akun[i].id !== user.id) {

    user.pemilikRek = document.getElementById('profilPemilikRek').value;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) {
            akun[i].nama = user.nama;
            akun[i].email = user.email;
            akun[i].hp = user.hp;
            akun[i].alamat = user.alamat;
            akun[i].bank = user.bank;
            akun[i].rekening = user.rekening;
            akun[i].pemilikRek = user.pemilikRek;
            break;
        }
    }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    document.getElementById('userNama').textContent = user.nama;
    tampilkanToast('Data pribadi dan rekening disimpan!', 'success');
}

function previewKTP(file) {
    if (!file) {
        return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('ktpPreview').innerHTML = '<img src="' + e.target.result + '" class="preview-img">';
        localStorage.setItem('2r_ktp_temp', e.target.result);
    };
    reader.readAsDataURL(file);
}

function simpanKTP() {
    var ktp = localStorage.getItem('2r_ktp_temp');
    if (!ktp) {
        tampilkanToast('Upload KTP dulu!', 'warning');
        return;
    }
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.ktp = ktp;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) {
            akun[i].ktp = ktp;
            break;
        }
    }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    localStorage.removeItem('2r_ktp_temp');
    tampilkanToast('KTP disimpan!', 'success');
}
</script>

<!-- ===== BLOK 6 (10) - 10 RENDER DAFTAR AKUN BARU ===== -->
<script>
function renderDaftarAkun() {
    var contentArea = document.getElementById('mainContent');
    var html = '';
    html += '<div class="page-header">';
    html += '<h2>Daftar Akun Baru</h2>';
    html += '<p>Form pendaftaran akun oleh SuperAdmin.</p>';
    html += '</div>';
    html += '<div class="card"><div class="card-header">Form Pendaftaran</div>';
    html += '<div class="form-group"><label>Role</label><select id="daftarRole" class="form-input" onchange="updatePreviewId()"><option value="customer">Customer</option><option value="toko">Toko (Verifikasi)</option><option value="ojek">Ojek (Verifikasi)</option><option value="pedagang">Pedagang Pasar</option><option value="staf_admin">Staf Admin</option><option value="staf_owner_ojek">Staf Owner Ojek</option><option value="staf_owner_toko">Staf Owner Toko</option><option value="customer_service">Customer Service</option><option value="sponsor">Sponsor</option></select></div>';
    html += '<div class="form-group"><label>ID Akun (Otomatis)</label><div style="background:#f0f0f0;border:2px solid #ddd;border-radius:8px;padding:12px;"><span id="daftarIdPreview" style="font-weight:600;">' + generateId('customer') + '</span></div></div>';
    html += '<div class="form-group"><label>Username</label><input type="text" id="daftarUsername" class="form-input" placeholder="Username" required></div>';
    html += '<div class="form-group"><label>Password</label><input type="password" id="daftarPassword" class="form-input" placeholder="Password" required></div>';
    html += '<div class="form-group"><label>Nama Lengkap</label><input type="text" id="daftarNama" class="form-input" placeholder="Nama Lengkap" required></div>';
    html += '<button class="btn btn-primary" style="width:100%;" onclick="prosesDaftarAkun()"><i class="fas fa-user-plus"></i> Buat Akun Baru</button></div>';
    contentArea.innerHTML = html;
}

function updatePreviewId() {
    var role = document.getElementById('daftarRole').value;
    document.getElementById('daftarIdPreview').textContent = generateId(role);
}

function prosesDaftarAkun() {
    var role = document.getElementById('daftarRole').value;
    var username = document.getElementById('daftarUsername').value.trim();
    var password = document.getElementById('daftarPassword').value.trim();
    var nama = document.getElementById('daftarNama').value.trim();
    if (!role || !username || !password || !nama) {
        tampilkanToast('Data belum lengkap!', 'warning');
        return;
    }
    if (username.length < 4) {
        tampilkanToast('Username minimal 4 karakter!', 'warning');
        return;
    }
    if (password.length < 6) {
        tampilkanToast('Password minimal 6 karakter!', 'warning');
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].username === username) {
            tampilkanToast('Username sudah digunakan!', 'error');
            return;
        }
    }
    var statusAkun = '';
    if (role === 'toko' || role === 'ojek') {
        statusAkun = 'NONAKTIF (Menunggu Verifikasi)';
    } else {
        statusAkun = 'AKTIF';
    }
    var akunBaru = {
        id: generateId(role),
        role: role,
        username: username,
        password: encodePassword(password),
        nama: nama,
        email: '',
        hp: '',
        alamat: '',
        bank: '',
        rekening: '',
        pemilikRek: '',
        status: statusAkun,
        registeredAt: new Date().toISOString()
    };
    akun.push(akunBaru);
    simpanDataAkun(akun);
    document.getElementById('daftarUsername').value = '';
    document.getElementById('daftarPassword').value = '';
    document.getElementById('daftarNama').value = '';
    updatePreviewId();
    tampilkanToast('Akun ' + role + ' berhasil dibuat! ID: ' + akunBaru.id, 'success');
}
</script>
<!-- ===== AKHIR BLOK 6 (10) ===== -->

<!-- ===== BLOK 6 (11) - 11 RENDER PERSETUJUAN & KELOLA AKUN ===== -->
<script>
function renderPersetujuanAkun() {
    var akun = getDataAkun();
    var daftar = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].role !== 'superadmin' && akun[i].role !== 'customer') {
            daftar.push(akun[i]);
        }
    }
    var contentArea = document.getElementById('mainContent');
    var html = '<div class="page-header"><h2>Persetujuan Akun</h2><p>Daftar akun yang membutuhkan persetujuan.</p></div>';
    html += '<div class="card"><div class="card-header"><span>Daftar Permintaan</span><span>Total: ' + daftar.length + ' akun</span></div>';
    if (daftar.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-check-circle" style="color:#4CAF50;"></i><h3>Tidak ada akun menunggu</h3></div>';
    } else {
        html += '<div class="table-container"><table class="table"><thead><tr><th>ID</th><th>Role</th><th>Username</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < daftar.length; i++) {
            var a = daftar[i];
            var badge = '';
            var statusText = '';
            if (a.status === 'AKTIF') {
                badge = 'badge-success';
                statusText = 'AKTIF';
            } else {
                badge = 'badge-warning';
                statusText = 'Menunggu';
            }
            html += '<tr><td>' + a.id + '</td><td>' + a.role + '</td><td>' + a.username + '</td><td>' + a.nama + '</td><td><span class="badge ' + badge + '">' + statusText + '</span></td><td>';
            if (a.status !== 'AKTIF') {
                html += '<button class="btn btn-success btn-xs" onclick="setujuiAkun(\'' + a.id + '\')" style="margin-right:5px;">Setujui</button><button class="btn btn-danger btn-xs" onclick="bukaTolakAkun(\'' + a.id + '\')">Tolak</button>';
            } else {
                html += '<span style="color:#888;">Sudah Aktif</span>';
            }
            html += '</td></tr>';
        }
        html += '</tbody></table></div>';
    }
    html += '</div>';
    contentArea.innerHTML = html;
}

function setujuiAkun(id) {
    if (!confirm('Setujui akun ini?')) {
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === id) {
            akun[i].status = 'AKTIF';
            break;
        }
    }
    simpanDataAkun(akun);
    renderPersetujuanAkun();
    tampilkanToast('Akun diaktifkan!', 'success');
}

function bukaTolakAkun(id) {
    document.getElementById('tolakIdAkun').value = id;
    bukaModal('modalTolakAkun');
}

function eksekusiTolakAkun() {
    var id = document.getElementById('tolakIdAkun').value;
    var akun = getDataAkun();
    var akunBaru = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id !== id) {
            akunBaru.push(akun[i]);
        }
    }
    simpanDataAkun(akunBaru);
    tutupModal('modalTolakAkun');
    renderPersetujuanAkun();
    tampilkanToast('Akun ditolak!', 'success');
}

function renderKelolaAkun() {
    var akun = getDataAkun();
    var daftar = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].role !== 'superadmin') {
            daftar.push(akun[i]);
        }
    }
    var contentArea = document.getElementById('mainContent');
    var html = '<div class="page-header"><h2>Kelola Semua Akun</h2><p>Mengelola seluruh akun terdaftar.</p></div><div class="card">';
    if (daftar.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-users-slash"></i><h3>Belum ada akun</h3></div>';
    } else {
        html += '<div class="table-container"><table class="table"><thead><tr><th>No</th><th>ID</th><th>Role</th><th>Username</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < daftar.length; i++) {
            var a = daftar[i];
            var badge = '';
            var statusText = '';
            if (a.status === 'AKTIF') {
                badge = 'badge-success';
                statusText = 'AKTIF';
            } else if (a.status === 'NONAKTIF (Menunggu Verifikasi)') {
                badge = 'badge-warning';
                statusText = 'Menunggu';
            } else {
                badge = 'badge-danger';
                statusText = 'Nonaktif';
            }
            html += '<tr><td>' + (i+1) + '</td><td>' + a.id + '</td><td>' + a.role + '</td><td>' + a.username + '</td><td>' + a.nama + '</td><td><span class="badge ' + badge + '">' + statusText + '</span></td><td><div style="display:flex;gap:5px;">';
            if (a.status !== 'AKTIF') {
                html += '<button class="btn btn-success btn-xs" onclick="aktifkanAkun(\'' + a.id + '\')">Aktifkan</button>';
            } else {
                html += '<button class="btn btn-warning btn-xs" onclick="nonaktifkanAkun(\'' + a.id + '\')">Nonaktifkan</button>';
            }
            html += '<button class="btn btn-danger btn-xs" onclick="hapusAkun(\'' + a.id + '\')">Hapus</button></div></td></tr>';
        }
        html += '</tbody></table></div>';
    }
    html += '</div>';
    contentArea.innerHTML = html;
}

function aktifkanAkun(id) {
    if (!confirm('Aktifkan akun ini?')) {
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === id) {
            akun[i].status = 'AKTIF';
            break;
        }
    }
    simpanDataAkun(akun);
    renderKelolaAkun();
    tampilkanToast('Akun diaktifkan!', 'success');
}

function nonaktifkanAkun(id) {
    if (!confirm('Nonaktifkan akun ini?')) {
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === id) {
            akun[i].status = 'NONAKTIF (Dinonaktifkan)';
            break;
        }
    }
    simpanDataAkun(akun);
    renderKelolaAkun();
    tampilkanToast('Akun dinonaktifkan!', 'success');
}

function hapusAkun(id) {
    if (!confirm('HAPUS permanen akun ini?')) {
        return;
    }
    if (!confirm('KONFIRMASI: Yakin hapus?')) {
        return;
    }
    var akun = getDataAkun();
    var akunBaru = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id !== id) {
            akunBaru.push(akun[i]);
        }
    }
    simpanDataAkun(akunBaru);
    renderKelolaAkun();
    tampilkanToast('Akun dihapus!', 'success');
}
</script>

<script>
function tampilkanDashboard(user) {
    document.getElementById('pageAuth').style.display = 'none';
    document.getElementById('pageDashboard').style.display = 'block';
    document.getElementById('userNama').textContent = user.nama;
    var namaRole = {
        superadmin: 'SuperAdmin',
        customer: 'Customer',
        toko: 'Toko',
        ojek: 'Ojek',
        pedagang: 'Pedagang Pasar',
        staf_admin: 'Staf Admin',
        customer_service: 'Customer Service',
        staf_owner_toko: 'Staf Owner Toko',
        staf_owner_ojek: 'Staf Owner Ojek',
        sponsor: 'Sponsor'
    };
    document.getElementById('roleBadge').textContent = namaRole[user.role] || user.role;
    document.getElementById('sidebarContainer').innerHTML = buatSidebarHTML(user.role);
    setupNavigasiSidebar();
    renderDashboard();
}

document.addEventListener('DOMContentLoaded', function() {
    inisialisasiSuperAdmin();
    var userData = localStorage.getItem('2r_user');
    if (userData) {
        var user = JSON.parse(userData);
        tampilkanDashboard(user);
    }
    document.getElementById('btnLogout').onclick = function() {
        if (confirm('Keluar dari aplikasi?')) {
            localStorage.removeItem('2r_user');
            localStorage.removeItem('2r_user_role');
            location.reload();
        }
    };
    var modals = document.querySelectorAll('.modal-overlay');
    for (var i = 0; i < modals.length; i++) {
        modals[i].onclick = function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        };
    }
});
</script>
