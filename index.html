<!-- ============ BLOK 8 SCRIPTS PROFIL & UPLOAD ============ -->
<!-- PENJELASAN: 
     Fungsi untuk memuat, menyimpan, dan mengelola data profil, serta manajemen dokumen. -->

<script>
    const PROFILE_KEY = '2r_superadmin_profile';
    const APP_KEY = '2r_aplikasi_data';
    const DOCUMENTS_KEY = '2r_superadmin_documents';
    const AKUN_KEY = '2r_akun';

    function loadProfil() {
        // Data Aplikasi
        var dataApp = localStorage.getItem(APP_KEY);
        var app = dataApp ? JSON.parse(dataApp) : {};
        document.getElementById('appNama').value = app.namaAplikasi || 'Toko Online 2R';
        document.getElementById('appPenerbit').value = app.penerbit || 'Toko Online 2R';
        document.getElementById('appPemilik').value = app.pemilik || 'SuperAdmin';
        document.getElementById('appPengelola').value = app.pengelola || 'SuperAdmin';

        // Username SuperAdmin
        var dataAkun = localStorage.getItem(AKUN_KEY);
        var daftarAkun = dataAkun ? JSON.parse(dataAkun) : [];
        var sa = daftarAkun.find(function(a) { return a.role === 'superadmin'; });
        if (sa) document.getElementById('superadminUsername').value = sa.username || '';

        // Data Pribadi
        var dataProfil = localStorage.getItem(PROFILE_KEY);
        var profil = dataProfil ? JSON.parse(dataProfil) : {};
        document.getElementById('profilNama').value = profil.nama || '';
        document.getElementById('profilAlamat').value = profil.alamat || '';
        document.getElementById('profilEmail').value = profil.email || '';
        document.getElementById('profilHp').value = profil.hp || '';
        document.getElementById('profilJabatan').value = profil.jabatan || '';
        document.getElementById('textKeterangan').value = profil.keterangan || '';

        renderDokumen();
    }

    function simpanDataAplikasi() {
        var data = {
            namaAplikasi: document.getElementById('appNama').value.trim(),
            penerbit: document.getElementById('appPenerbit').value.trim(),
            pemilik: document.getElementById('appPemilik').value.trim(),
            pengelola: document.getElementById('appPengelola').value.trim()
        };
        if (!data.namaAplikasi) {
            tampilkanToast('Nama aplikasi tidak boleh kosong!', 'error');
            return;
        }
        localStorage.setItem(APP_KEY, JSON.stringify(data));
        tampilkanToast('Data aplikasi berhasil disimpan!', 'success');
    }

    function ubahPasswordSuperAdmin() {
        var usernameBaru = document.getElementById('superadminUsername').value.trim();
        var passwordBaru = document.getElementById('superadminPassword').value.trim();
        var konfirmasi = document.getElementById('superadminPasswordKonfirmasi').value.trim();

        if (!usernameBaru) {
            tampilkanToast('Username tidak boleh kosong!', 'error');
            return;
        }
        if (!passwordBaru) {
            tampilkanToast('Password baru tidak boleh kosong!', 'error');
            return;
        }
        if (passwordBaru.length < 6) {
            tampilkanToast('Password minimal 6 karakter!', 'warning');
            return;
        }
        if (passwordBaru !== konfirmasi) {
            tampilkanToast('Password dan konfirmasi tidak cocok!', 'error');
            return;
        }

        var dataAkun = localStorage.getItem(AKUN_KEY);
        var daftarAkun = dataAkun ? JSON.parse(dataAkun) : [];
        var ditemukan = false;
        for (var i = 0; i < daftarAkun.length; i++) {
            if (daftarAkun[i].role === 'superadmin') {
                daftarAkun[i].username = usernameBaru;
                daftarAkun[i].password = btoa(passwordBaru);
                ditemukan = true;
                break;
            }
        }
        if (ditemukan) {
            localStorage.setItem(AKUN_KEY, JSON.stringify(daftarAkun));
            document.getElementById('superadminPassword').value = '';
            document.getElementById('superadminPasswordKonfirmasi').value = '';
            tampilkanToast('Password berhasil diubah! Silakan login ulang.', 'success');
            setTimeout(function() {
                if (confirm('Password diubah. Anda harus login ulang. Keluar sekarang?')) {
                    logout();
                }
            }, 2000);
        } else {
            tampilkanToast('SuperAdmin tidak ditemukan!', 'error');
        }
    }

    function simpanDataPribadi() {
        var data = {
            nama: document.getElementById('profilNama').value.trim(),
            alamat: document.getElementById('profilAlamat').value.trim(),
            email: document.getElementById('profilEmail').value.trim(),
            hp: document.getElementById('profilHp').value.trim(),
            jabatan: document.getElementById('profilJabatan').value.trim()
        };
        if (!data.nama) {
            tampilkanToast('Nama tidak boleh kosong!', 'error');
            return;
        }
        localStorage.setItem(PROFILE_KEY, JSON.stringify(data));
        tampilkanToast('Data pribadi berhasil disimpan!', 'success');
    }

    function simpanKeterangan() {
        var dataProfil = localStorage.getItem(PROFILE_KEY);
        var profil = dataProfil ? JSON.parse(dataProfil) : {};
        profil.keterangan = document.getElementById('textKeterangan').value;
        localStorage.setItem(PROFILE_KEY, JSON.stringify(profil));
        tampilkanToast('Keterangan berhasil disimpan!', 'success');
    }

    // ===== DOKUMEN =====
    function getDocuments() {
        var data = localStorage.getItem(DOCUMENTS_KEY);
        return data ? JSON.parse(data) : [];
    }
    function saveDocuments(doc) { localStorage.setItem(DOCUMENTS_KEY, JSON.stringify(doc)); }

    function renderDokumen() {
        var docs = getDocuments();
        var container = document.getElementById('daftarDokumen');
        if (!container) return;
        if (docs.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-cloud-upload-alt"></i><h3>Belum ada dokumen</h3><p>Klik tombol di atas untuk menambahkan dokumen.</p></div>`;
            return;
        }
        var html = '';
        for (var i = 0; i < docs.length; i++) {
            var doc = docs[i];
            var isImage = doc.type && doc.type.startsWith('image/');
            var preview = isImage 
                ? `<img src="${doc.data}" alt="${doc.name}" onclick="bukaPreviewGambar('${doc.data}','${doc.name}')" class="doc-thumb">`
                : `<div class="doc-icon"><i class="fas fa-file-alt"></i></div>`;
            html += `
                <div class="doc-item">
                    <div class="doc-info">
                        ${preview}
                        <div class="doc-text"><h4>${doc.name}</h4><p>${doc.keterangan || 'Tidak ada keterangan'}</p></div>
                    </div>
                    <div class="doc-actions">
                        <button class="btn btn-secondary btn-xs" onclick="editDokumen('${doc.id}')"><i class="fas fa-edit"></i></button>
                        <a href="${doc.data}" download="${doc.name}" class="btn btn-primary btn-xs"><i class="fas fa-download"></i></a>
                        <button class="btn btn-danger btn-xs" onclick="hapusDokumen('${doc.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function uploadDokumen(event) {
        var files = event.target.files;
        if (!files || files.length === 0) return;
        var docs = getDocuments();
        var selesai = 0;
        tampilkanToast('Mengunggah ' + files.length + ' file...', 'info');
        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            if (file.size > 10 * 1024 * 1024) {
                tampilkanToast('File ' + file.name + ' terlalu besar (max 10MB)', 'warning');
                selesai++;
                if (selesai === files.length) { event.target.value = ''; renderDokumen(); }
                continue;
            }
            var reader = new FileReader();
            reader.onload = function(e) {
                docs.push({ id: Date.now() + '-' + Math.random().toString(36).substr(2,9), name: file.name, type: file.type, data: e.target.result, keterangan: '' });
                selesai++;
                if (selesai === files.length) {
                    saveDocuments(docs);
                    renderDokumen();
                    tampilkanToast(selesai + ' dokumen berhasil diunggah!', 'success');
                    event.target.value = '';
                }
            };
            reader.readAsDataURL(file);
        }
    }

    function editDokumen(id) {
        var docs = getDocuments();
        var doc = null;
        for (var i = 0; i < docs.length; i++) {
            if (docs[i].id === id) { doc = docs[i]; break; }
        }
        if (doc) {
            document.getElementById('editDocId').value = id;
            document.getElementById('editDocName').value = doc.name;
            document.getElementById('editDocKeterangan').value = doc.keterangan || '';
            bukaModal('modalEditDokumen');
        } else {
            tampilkanToast('Dokumen tidak ditemukan!', 'error');
        }
    }

    function simpanEditDokumen() {
        var id = document.getElementById('editDocId').value;
        var namaBaru = document.getElementById('editDocName').value.trim();
        var ketBaru = document.getElementById('editDocKeterangan').value.trim();
        if (!namaBaru) {
            tampilkanToast('Nama file tidak boleh kosong!', 'error');
            return;
        }
        var docs = getDocuments();
        var ditemukan = false;
        for (var i = 0; i < docs.length; i++) {
            if (docs[i].id === id) {
                docs[i].name = namaBaru;
                docs[i].keterangan = ketBaru;
                ditemukan = true;
                break;
            }
        }
        if (ditemukan) {
            saveDocuments(docs);
            renderDokumen();
            tutupModal('modalEditDokumen');
            tampilkanToast('Dokumen berhasil diperbarui!', 'success');
        } else {
            tampilkanToast('Dokumen tidak ditemukan!', 'error');
        }
    }

    function hapusDokumen(id) {
        if (!confirm('Yakin ingin menghapus dokumen ini?')) return;
        var docs = getDocuments();
        var baru = [];
        var ditemukan = false;
        for (var i = 0; i < docs.length; i++) {
            if (docs[i].id !== id) {
                baru.push(docs[i]);
            } else {
                ditemukan = true;
            }
        }
        if (ditemukan) {
            saveDocuments(baru);
            renderDokumen();
            tampilkanToast('Dokumen berhasil dihapus!', 'success');
        } else {
            tampilkanToast('Dokumen tidak ditemukan!', 'error');
        }
    }

    function bukaPreviewGambar(src, nama) {
        document.getElementById('modalPreviewImage').src = src;
        document.getElementById('modalPreviewTitle').textContent = 'Preview: ' + nama;
        bukaModal('modalPreviewGambar');
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadProfil();
        var btnUpload = document.getElementById('btnUnggahDokumen');
        var inputFile = document.getElementById('inputDokumen');
        if (btnUpload && inputFile) {
            btnUpload.onclick = function() { inputFile.click(); };
            inputFile.onchange = function(e) { uploadDokumen(e); };
        }
        var textKet = document.getElementById('textKeterangan');
        if (textKet) {
            textKet.onblur = function() { simpanKeterangan(); };
        }
    });

    (function() {
        var asli = window.navigasiHalaman;
        if (typeof asli === 'function') {
            window.navigasiHalaman = function(halaman) {
                asli(halaman);
                if (halaman === 'profile' && typeof loadProfil === 'function') {
                    loadProfil();
                }
            };
        }
    })();
</script>
<!-- ============ AKHIR BLOK 8 ============ -->
</body>
</html>
