<script>
    /* ===== BLOK 4.2.1 - TERUSKAN PENGAJUAN DARI STAF ADMIN KE SUPERADMIN ===== */
    /*
        Fungsi ini dipanggil saat Staf Admin menekan tombol "Teruskan ke SuperAdmin".
        Mengubah status pengajuan Customer menjadi 'DITERUSKAN',
        lalu menyimpan data pengajuan ke database pengajuan Staf (untuk SuperAdmin).
    */
    function teruskanPengajuanHapus(index) {
        var dataPengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
        if (index < 0 || index >= dataPengajuan.length) {
            tampilkanToast('Data tidak ditemukan!', 'error');
            return;
        }
        if (!confirm('Teruskan pengajuan ini ke SuperAdmin?')) {
            return;
        }
        
        // Ubah status pengajuan customer menjadi DITERUSKAN
        dataPengajuan[index].status = 'DITERUSKAN';
        localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(dataPengajuan));
        
        // Ambil data pengajuan yang diteruskan
        var pengajuanTerpilih = dataPengajuan[index];
        
        // Simpan ke dalam database pengajuan staf (untuk SuperAdmin)
        var dataPengajuanStaf = JSON.parse(localStorage.getItem('2r_pengajuan_hapus_staf') || '[]');
        dataPengajuanStaf.push({
            id: Date.now(),
            targetId: pengajuanTerpilih.userId,
            targetUsername: pengajuanTerpilih.username,
            targetNama: pengajuanTerpilih.nama,
            targetRole: pengajuanTerpilih.role,
            diajukanOleh: 'Staf Admin',
            status: 'MENUNGGU',
            diajukanPada: new Date().toISOString()
        });
        localStorage.setItem('2r_pengajuan_hapus_staf', JSON.stringify(dataPengajuanStaf));
        
        // Kirim notifikasi ke SuperAdmin (jika fungsi notifikasi ada)
        if (typeof simpanNotifikasi === 'function') {
            simpanNotifikasi('ALL', 'Pengajuan Diteruskan ke SuperAdmin', 
                'Staf Admin meneruskan pengajuan hapus akun dari Customer ' + pengajuanTerpilih.username + ' (' + pengajuanTerpilih.nama + ') ke SuperAdmin.', 
                'account');
        }
        
        renderDashboard();
        tampilkanToast('Pengajuan diteruskan ke SuperAdmin!', 'success');
    }
    /* ===== AKHIR BLOK 4.2.1 ===== */

    /* ===== BLOK 4.2.2 - TOLAK PENGAJUAN OLEH STAF ADMIN ===== */
    /*
        Fungsi ini dipanggil saat Staf Admin menekan tombol "Tolak".
        Mengubah status pengajuan Customer menjadi 'DITOLAK'.
    */
    function tolakPengajuanHapusStaf(index) {
        var dataPengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
        if (index < 0 || index >= dataPengajuan.length) {
            tampilkanToast('Data tidak ditemukan!', 'error');
            return;
        }
        if (!confirm('Tolak pengajuan ini?')) {
            return;
        }
        dataPengajuan[index].status = 'DITOLAK';
        localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(dataPengajuan));
        
        // Kirim notifikasi ke Customer (jika fungsi notifikasi ada)
        if (typeof simpanNotifikasi === 'function') {
            simpanNotifikasi(dataPengajuan[index].userId, 'Pengajuan Hapus Akun Ditolak', 
                'Pengajuan hapus akun Anda telah ditolak oleh Staf Admin.', 
                'account');
        }
        
        renderDashboard();
        tampilkanToast('Pengajuan ditolak.', 'success');
    }
    /* ===== AKHIR BLOK 4.2.2 ===== */

    /* ===== BLOK 4.2.3 - SETUJUI PENGAJUAN OLEH SUPERADMIN ===== */
    /*
        Fungsi ini dipanggil saat SuperAdmin menekan tombol "Setujui & Hapus".
        1. Menghapus akun target dari database utama.
        2. Mengubah status pengajuan Staf menjadi 'DISETUJUI'.
        3. Mengubah status pengajuan Customer menjadi 'DISETUJUI'.
        4. Mengirim notifikasi ke Customer.
    */
    function setujuiPengajuanStaf(index) {
        var dataPengajuanStaf = JSON.parse(localStorage.getItem('2r_pengajuan_hapus_staf') || '[]');
        if (index < 0 || index >= dataPengajuanStaf.length) {
            tampilkanToast('Data tidak ditemukan!', 'error');
            return;
        }
        if (!confirm('Setujui dan hapus akun ini secara permanen?')) {
            return;
        }
        
        var pengajuanTerpilih = dataPengajuanStaf[index];
        
        // 1. Hapus akun dari database utama
        var dataAkun = getDataAkun();
        var dataAkunBaru = [];
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id !== pengajuanTerpilih.targetId) {
                dataAkunBaru.push(dataAkun[i]);
            }
        }
        simpanDataAkun(dataAkunBaru);
        
        // 2. Update status pengajuan staf menjadi DISETUJUI (supaya tidak muncul lagi di tabel)
        dataPengajuanStaf[index].status = 'DISETUJUI';
        localStorage.setItem('2r_pengajuan_hapus_staf', JSON.stringify(dataPengajuanStaf));
        
        // 3. Update status pengajuan customer (jika ada) menjadi DISETUJUI
        var dataPengajuanCustomer = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
        for (var i = 0; i < dataPengajuanCustomer.length; i++) {
            if (dataPengajuanCustomer[i].userId === pengajuanTerpilih.targetId && dataPengajuanCustomer[i].status === 'DITERUSKAN') {
                dataPengajuanCustomer[i].status = 'DISETUJUI';
                break;
            }
        }
        localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(dataPengajuanCustomer));
        
        // Kirim notifikasi ke Customer (jika fungsi notifikasi ada)
        if (typeof simpanNotifikasi === 'function') {
            simpanNotifikasi(pengajuanTerpilih.targetId, 'Pengajuan Hapus Akun Disetujui', 
                'Pengajuan hapus akun Anda telah disetujui oleh SuperAdmin. Akun Anda telah dihapus permanen.', 
                'account');
        }
        
        // 4. Render ulang dashboard agar tabel langsung kosong
        renderDashboard();
        
        tampilkanToast('Akun berhasil dihapus permanen!', 'success');
    }
    /* ===== AKHIR BLOK 4.2.3 ===== */

    /* ===== BLOK 4.2.4 - TOLAK PENGAJUAN OLEH SUPERADMIN ===== */
    /*
        Fungsi ini dipanggil saat SuperAdmin menekan tombol "Tolak".
        Mengubah status pengajuan Staf menjadi 'DITOLAK',
        dan mengubah status pengajuan Customer menjadi 'DITOLAK'.
    */
    function tolakPengajuanStaf(index) {
        var dataPengajuanStaf = JSON.parse(localStorage.getItem('2r_pengajuan_hapus_staf') || '[]');
        if (index < 0 || index >= dataPengajuanStaf.length) {
            tampilkanToast('Data tidak ditemukan!', 'error');
            return;
        }
        if (!confirm('Tolak pengajuan ini?')) {
            return;
        }
        
        // Update status pengajuan staf menjadi DITOLAK
        dataPengajuanStaf[index].status = 'DITOLAK';
        localStorage.setItem('2r_pengajuan_hapus_staf', JSON.stringify(dataPengajuanStaf));
        
        // Update status pengajuan customer (jika ada) menjadi DITOLAK
        var dataPengajuanCustomer = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
        for (var i = 0; i < dataPengajuanCustomer.length; i++) {
            if (dataPengajuanCustomer[i].userId === dataPengajuanStaf[index].targetId && dataPengajuanCustomer[i].status === 'DITERUSKAN') {
                dataPengajuanCustomer[i].status = 'DITOLAK';
                break;
            }
        }
        localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(dataPengajuanCustomer));
        
        // Kirim notifikasi ke Customer (jika fungsi notifikasi ada)
        if (typeof simpanNotifikasi === 'function') {
            simpanNotifikasi(dataPengajuanStaf[index].targetId, 'Pengajuan Hapus Akun Ditolak', 
                'Pengajuan hapus akun Anda telah ditolak oleh SuperAdmin.', 
                'account');
        }
        
        renderDashboard();
        tampilkanToast('Pengajuan ditolak.', 'success');
    }
    /* ===== AKHIR BLOK 4.2.4 ===== */
</script>

        html += '<div><label class="form-label">Nomor HP</label><input type="tel" id="saHp" class="form-input" value="' + (user.nomorHp || '') + '"></div>';
        html += '</div>';
        html += '<div class="grid-2" style="margin-top:10px;">';
        html += '<div><label class="form-label">Nama Bank</label><input type="text" id="saBank" class="form-input" value="' + (user.namaBank || '') + '"></div>';
        html += '<div><label class="form-label">Nomor Rekening</label><input type="text" id="saRekening" class="form-input" value="' + (user.nomorRekening || '') + '"></div>';
        html += '<div><label class="form-label">Nama Pemilik Rekening</label><input type="text" id="saPemilikRek" class="form-input" value="' + (user.pemilikRekening || '') + '"></div>';
        html += '</div></div>';

        // ===== DOKUMEN PERUSAHAAN =====
        html += '<div class="card">';
        html += '<div class="card-header"><span><i class="fas fa-folder-open" style="color:#FF6B00;"></i> Dokumen Perusahaan</span>';
        html += '<button class="button button-primary button-small" id="btnUploadDokumen"><i class="fas fa-upload"></i> Unggah</button>';
        html += '<input type="file" id="inputDokumen" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style="display:none"></div>';
        html += '<div id="daftarDokumen">';
        html += '<div class="empty-state"><i class="fas fa-cloud-upload-alt"></i><h3>Belum ada dokumen</h3></div>';
        html += '</div></div>';

        // ===== KETERANGAN =====
        html += '<div class="card">';
        html += '<div class="card-header"><span><i class="fas fa-sticky-note" style="color:#FF6B00;"></i> Keterangan</span></div>';
        html += '<textarea id="textKeterangan" rows="4" class="form-input" placeholder="Isi keterangan...">' + (localStorage.getItem('2r_keterangan_sa') || '') + '</textarea>';
        html += '<button class="button button-primary margin-top-10" onclick="simpanKeteranganSA()"><i class="fas fa-save"></i> Simpan</button>';
        html += '</div>';

        areaKonten.innerHTML = html;

        // ===== EVENT LISTENER UNTUK UPLOAD DOKUMEN =====
        setTimeout(function() {
            var tombolUpload = document.getElementById('btnUploadDokumen');
            var inputUpload = document.getElementById('inputDokumen');
            if (tombolUpload && inputUpload) {
                tombolUpload.onclick = function() {
                    inputUpload.click();
                };
                inputUpload.onchange = function(e) {
                    uploadDokumenSA(e.target.files);

    /* ===== AKHIR BLOK 4.3.1 ===== */
</script>

<!-- ===== BLOK 4.4 - JS_SUPERADMIN_PENDUKUNG ===== -->
<script>
    /* ===== BLOK 4.4.1 - SIMPAN DATA APLIKASI ===== */
    /*
        Fungsi ini menyimpan data aplikasi (nama, penerbit, pemilik, pengelola)
        ke localStorage dengan kunci '2r_data_aplikasi'.
    */
    function simpanDataAplikasi() {
        var data = {
            nama: document.getElementById('appNama').value,
            penerbit: document.getElementById('appPenerbit').value,
            pemilik: document.getElementById('appPemilik').value,
            pengelola: document.getElementById('appPengelola').value
        };
        localStorage.setItem('2r_data_aplikasi', JSON.stringify(data));
        tampilkanToast('Data aplikasi disimpan!', 'success');
    }
    /* ===== AKHIR BLOK 4.4.1 ===== */

    /* ===== BLOK 4.4.2 - LOAD DATA APLIKASI ===== */
    /*
        Fungsi ini memuat data aplikasi dari localStorage ke dalam form.
        Dipanggil saat halaman profil SuperAdmin dirender.
    */
    function loadDataAplikasi() {
        var data = JSON.parse(localStorage.getItem('2r_data_aplikasi') || '{}');
        if (document.getElementById('appNama')) {
            document.getElementById('appNama').value = data.nama || '';
        }
        if (document.getElementById('appPenerbit')) {
            document.getElementById('appPenerbit').value = data.penerbit || '';
        }
        if (document.getElementById('appPemilik')) {
            document.getElementById('appPemilik').value = data.pemilik || '';
        }
        if (document.getElementById('appPengelola')) {
            document.getElementById('appPengelola').value = data.pengelola || '';
        }
    }
    /* ===== AKHIR BLOK 4.4.2 ===== */

    /* ===== BLOK 4.4.3 - UBAH PASSWORD SUPERADMIN ===== */
    /*
        Fungsi ini mengubah username dan/atau password SuperAdmin.
        Jika password diisi, akan dienkripsi menggunakan encodePassword().
    */
    function ubahPasswordSA() {
        var usernameBaru = document.getElementById('saUsername').value.trim();
        var passwordBaru = document.getElementById('saPassword').value.trim();
        var konfirmasiPassword = document.getElementById('saPasswordKonfirmasi').value.trim();
        
        if (!usernameBaru) {
            tampilkanToast('Username tidak boleh kosong!', 'warning');
            return;
        }
        if (passwordBaru && passwordBaru !== konfirmasiPassword) {
            tampilkanToast('Password tidak cocok!', 'error');
            return;
        }
        if (passwordBaru && passwordBaru.length < 6) {
            tampilkanToast('Password minimal 6 karakter!', 'warning');
            return;
        }
        
        var user = JSON.parse(localStorage.getItem('2r_user'));
        var dataAkun = getDataAkun();
        
        user.username = usernameBaru;
        if (passwordBaru) {
            user.password = encodePassword(passwordBaru);
        }
        
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === user.id) {
                dataAkun[i].username = usernameBaru;
                if (passwordBaru) {
                    dataAkun[i].password = encodePassword(passwordBaru);
                }
                break;
            }
        }
        
        localStorage.setItem('2r_user', JSON.stringify(user));
        simpanDataAkun(dataAkun);
        document.getElementById('saPassword').value = '';
        document.getElementById('saPasswordKonfirmasi').value = '';
        tampilkanToast('Keamanan akun diperbarui!', 'success');
    }
    /* ===== AKHIR BLOK 4.4.3 ===== */

    /* ===== BLOK 4.4.4 - SIMPAN DATA PRIBADI & REKENING SUPERADMIN ===== */
    /*
        Fungsi ini menyimpan data pribadi dan rekening SuperAdmin
        ke localStorage dan database akun.
    */
    function simpanDataPribadiSA() {
        var user = JSON.parse(localStorage.getItem('2r_user'));
        var dataAkun = getDataAkun();
        
        user.nama = document.getElementById('saNama').value;
        user.alamat = document.getElementById('saAlamat').value;
        user.email = document.getElementById('saEmail').value;
        user.nomorHp = document.getElementById('saHp').value;
        user.namaBank = document.getElementById('saBank').value;
        user.nomorRekening = document.getElementById('saRekening').value;
        user.pemilikRekening = document.getElementById('saPemilikRek').value;
        
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === user.id) {
                dataAkun[i].nama = user.nama;
                dataAkun[i].alamat = user.alamat;
                dataAkun[i].email = user.email;
                dataAkun[i].nomorHp = user.nomorHp;
                dataAkun[i].namaBank = user.namaBank;
                dataAkun[i].nomorRekening = user.nomorRekening;
                dataAkun[i].pemilikRekening = user.pemilikRekening;
                break;
            }
        }
        
        localStorage.setItem('2r_user', JSON.stringify(user));
        simpanDataAkun(dataAkun);
        document.getElementById('userNama').textContent = user.nama;
        tampilkanToast('Data pribadi dan rekening disimpan!', 'success');
    }
    /* ===== AKHIR BLOK 4.4.4 ===== */

    /* ===== BLOK 4.4.5 - UPLOAD DOKUMEN PERUSAHAAN ===== */
    /*
        Fungsi ini mengupload satu atau lebih file dokumen,
        lalu menyimpannya ke localStorage dengan kunci '2r_dokumen_sa'.
    */
    function uploadDokumenSA(files) {
        var dataDokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
        var totalFile = files.length;
        var selesai = 0;
        
        for (var i = 0; i < files.length; i++) {
            (function(file) {
                var pembaca = new FileReader();
                pembaca.onload = function(e) {
                    dataDokumen.push({
                        id: Date.now(),
                        nama: file.name,
                        tipe: file.type,
                        data: e.target.result,
                        keterangan: '',
                        tanggal: new Date().toLocaleDateString('id-ID')
                    });
                    selesai++;
                    if (selesai === totalFile) {
                        localStorage.setItem('2r_dokumen_sa', JSON.stringify(dataDokumen));
                        loadDokumenSA();
                        tampilkanToast(totalFile + ' dokumen diunggah!', 'success');
                    }
                };
                pembaca.readAsDataURL(file);
            })(files[i]);
        }
    }
    /* ===== AKHIR BLOK 4.4.5 ===== */

    /* ===== BLOK 4.4.6 - LOAD DOKUMEN PERUSAHAAN ===== */
    /*
        Fungsi ini memuat daftar dokumen dari localStorage,
        lalu menampilkannya di halaman profil SuperAdmin.
        Setiap dokumen dilengkapi tombol download, bagikan, edit, dan hapus.
    */
    function loadDokumenSA() {
        var containerDokumen = document.getElementById('daftarDokumen');
        if (!containerDokumen) {
            return;
        }
        
        var dataDokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
        if (dataDokumen.length === 0) {
            containerDokumen.innerHTML = '<div class="empty-state"><i class="fas fa-cloud-upload-alt"></i><h3>Belum ada dokumen</h3></div>';
            return;
        }
        
        var html = '';
        for (var i = 0; i < dataDokumen.length; i++) {
            var d = dataDokumen[i];
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee;">';
            html += '<div style="display:flex;align-items:center;gap:15px;">';
            if (d.tipe && d.tipe.startsWith('image/')) {
                html += '<img src="' + d.data + '" style="width:50px;height:50px;border-radius:6px;object-fit:cover;cursor:pointer;" onclick="previewGambar(\'' + d.data + '\',\'' + d.nama + '\')">';
            } else {
                html += '<div style="width:50px;height:50px;background:#fff0e5;color:#FF6B00;display:flex;align-items:center;justify-content:center;border-radius:6px;"><i class="fas fa-file-alt"></i></div>';
            }
            html += '<div><h4 style="font-size:14px;">' + d.nama + '</h4><p style="font-size:12px;color:#888;">' + (d.keterangan || 'Tidak ada keterangan') + ' | ' + d.tanggal + '</p></div></div>';
            html += '<div style="display:flex;gap:6px;">';
            html += '<button class="button button-success button-extra-small" onclick="downloadDokumenSA(' + i + ')"><i class="fas fa-download"></i></button>';
            html += '<button class="button button-info button-extra-small" style="background:#17a2b8;color:white;" onclick="bagikanDokumenSA(' + i + ')"><i class="fas fa-share-alt"></i></button>';
            html += '<button class="button button-primary button-extra-small" onclick="editDokumenSA(' + i + ')"><i class="fas fa-edit"></i></button>';
            html += '<button class="button button-danger button-extra-small" onclick="hapusDokumenSA(' + i + ')"><i class="fas fa-trash"></i></button>';
            html += '</div></div>';
        }
        containerDokumen.innerHTML = html;
    }
    /* ===== AKHIR BLOK 4.4.6 ===== */

    /* ===== BLOK 4.4.7 - DOWNLOAD DOKUMEN ===== */
    /*
        Fungsi ini mendownload dokumen (file) yang dipilih.
    */
    function downloadDokumenSA(index) {
        var dataDokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
        var d = dataDokumen[index];
        if (!d || !d.data) {
            tampilkanToast('Dokumen tidak ditemukan!', 'error');
            return;
        }
        var link = document.createElement('a');
        link.href = d.data;
        link.download = d.nama;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        tampilkanToast('Dokumen sedang didownload!', 'success');
    }
    /* ===== AKHIR BLOK 4.4.7 ===== */

    /* ===== BLOK 4.4.8 - BAGIKAN DOKUMEN (COPY LINK) ===== */
    /*
        Fungsi ini menyalin data Base64 dokumen ke clipboard sebagai "link".
    */
    function bagikanDokumenSA(index) {
        var dataDokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
        var d = dataDokumen[index];
        if (!d || !d.data) {
            tampilkanToast('Dokumen tidak ditemukan!', 'error');
            return;
        }
        var link = d.data;
        navigator.clipboard.writeText(link).then(function() {
            tampilkanToast('Link dokumen disalin ke clipboard!', 'success');
        }).catch(function() {
            var textarea = document.createElement('textarea');
            textarea.value = link;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            tampilkanToast('Link dokumen disalin!', 'success');
        });
    }
    /* ===== AKHIR BLOK 4.4.8 ===== */

    /* ===== BLOK 4.4.9 - EDIT DOKUMEN ===== */
    /*
        Fungsi ini mengedit nama dan keterangan dokumen.
    */
    function editDokumenSA(index) {
        var dataDokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
        var namaBaru = prompt('Nama file:', dataDokumen[index].nama);
        if (namaBaru !== null) {
            var keteranganBaru = prompt('Keterangan:', dataDokumen[index].keterangan || '');
            if (keteranganBaru !== null) {
                dataDokumen[index].nama = namaBaru;
                dataDokumen[index].keterangan = keteranganBaru;
                localStorage.setItem('2r_dokumen_sa', JSON.stringify(dataDokumen));
                loadDokumenSA();
                tampilkanToast('Dokumen diperbarui!', 'success');
            }
        }
    }
    /* ===== AKHIR BLOK 4.4.9 ===== */

    /* ===== BLOK 4.4.10 - HAPUS DOKUMEN ===== */
    /*
        Fungsi ini menghapus dokumen dari localStorage.
    */
    function hapusDokumenSA(index) {
        if (!confirm('Hapus dokumen ini?')) {
            return;
        }
        var dataDokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
        dataDokumen.splice(index, 1);
        localStorage.setItem('2r_dokumen_sa', JSON.stringify(dataDokumen));
        loadDokumenSA();
        tampilkanToast('Dokumen dihapus!', 'success');
    }
    /* ===== AKHIR BLOK 4.4.10 ===== */

    /* ===== BLOK 4.4.11 - PREVIEW GAMBAR ===== */
    /*
        Fungsi ini menampilkan preview gambar di modal preview gambar.
    */
    function previewGambar(src, title) {
        document.getElementById('modalPreviewImage').src = src;
        document.getElementById('modalPreviewTitle').textContent = title || 'Preview';
        bukaModal('modalPreviewGambar');
    }
    /* ===== AKHIR BLOK 4.4.11 ===== */

    /* ===== BLOK 4.4.12 - SIMPAN KETERANGAN ===== */
    /*
        Fungsi ini menyimpan teks keterangan dari textarea.
    */
    function simpanKeteranganSA() {
        localStorage.setItem('2r_keterangan_sa', document.getElementById('textKeterangan').value);
        tampilkanToast('Keterangan disimpan!', 'success');
    }
    /* ===== AKHIR BLOK 4.4.12 ===== */

    /* ===== BLOK 4.4.13 - LOAD KETERANGAN ===== */
    /*
        Fungsi ini memuat keterangan dari localStorage ke textarea.
    */
    function loadKeteranganSA() {
        var k = localStorage.getItem('2r_keterangan_sa');
        var el = document.getElementById('textKeterangan');
        if (k && el) {
            el.value = k;
        }
    }
    /* ===== AKHIR BLOK 4.4.13 ===== */
</script>

<script>
    /* ===== BLOK 4.5.1 - RENDER PROFIL UMUM ===== */
    /*
        Fungsi ini menampilkan halaman profil untuk role selain SuperAdmin dan Customer.
        Digunakan untuk Toko, Ojek, Pedagang, Staf Admin, Customer Service, Sponsor.
        Menampilkan data pribadi, rekening, dan upload KTP.
    */
    function renderProfilUmum(user, role) {
        var areaKonten = document.getElementById('mainContent');
        if (!areaKonten) {
            return;
        }

        // Daftar nama role untuk ditampilkan di judul
        var namaRole = {
            customer: 'Customer',
            toko: 'Toko',
            ojek: 'Ojek',
            pedagang: 'Pedagang Pasar',
            staf_admin: 'Staf Admin',
            customer_service: 'Customer Service',
            staf_owner_toko: 'Staf Owner Toko',
            staf_owner_ojek: 'Staf Owner Ojek',
            sponsor: 'Sponsor'
        };

        var html = '';
        html += '<div class="page-header"><h2>Profil ' + (namaRole[role] || role) + '</h2><p>Kelola data pribadi, rekening, dan dokumen KTP Anda.</p></div>';
        
        // Data Pribadi & Rekening
        html += '<div class="card"><div class="card-header"><span><i class="fas fa-user-circle" style="color:#FF6B00;"></i> Data Pribadi & Rekening</span><button class="button button-primary button-small" onclick="simpanDataPribadiUmum()"><i class="fas fa-save"></i> Simpan</button></div>';
        html += '<div class="grid-2"><div><label class="form-label">Nama Lengkap</label><input type="text" id="profilNama" class="form-input" value="' + (user.nama || '') + '"></div>';
        html += '<div><label class="form-label">Email</label><input type="email" id="profilEmail" class="form-input" value="' + (user.email || '') + '"></div>';
        html += '<div><label class="form-label">Nomor HP</label><input type="tel" id="profilHp" class="form-input" value="' + (user.nomorHp || '') + '"></div>';
        html += '<div><label class="form-label">Alamat</label><input type="text" id="profilAlamat" class="form-input" value="' + (user.alamat || '') + '"></div></div>';
        html += '<div class="grid-2" style="margin-top:10px;"><div><label class="form-label">Nama Bank</label><input type="text" id="profilBank" class="form-input" value="' + (user.namaBank || '') + '"></div>';
        html += '<div><label class="form-label">Nomor Rekening</label><input type="text" id="profilRekening" class="form-input" value="' + (user.nomorRekening || '') + '"></div>';
        html += '<div><label class="form-label">Nama Pemilik Rekening</label><input type="text" id="profilPemilikRek" class="form-input" value="' + (user.pemilikRekening || '') + '"></div></div></div>';
        
        // Dokumen KTP
        html += '<div class="card"><div class="card-header"><span><i class="fas fa-id-card" style="color:#FF6B00;"></i> Dokumen KTP</span></div>';
        html += '<div class="upload-area" id="uploadKtpContainer"><div id="ktpPreview">';
        if (user.ktp) {
            html += '<img src="' + user.ktp + '" class="preview-image">';
        } else {
            html += '<i class="fas fa-cloud-upload-alt"></i><p>Klik untuk upload KTP</p>';
        }
        html += '</div><input type="file" id="inputKtp" accept=".jpg,.jpeg,.png" style="display:none"></div>';
        html += '<button class="button button-primary margin-top-10" onclick="simpanKTP()"><i class="fas fa-save"></i> Simpan KTP</button></div>';

        areaKonten.innerHTML = html;

        // Event listener untuk upload KTP
        setTimeout(function() {
            var containerKTP = document.getElementById('uploadKtpContainer');
            var inputKTP = document.getElementById('inputKtp');
            if (containerKTP && inputKTP) {
                containerKTP.onclick = function() {
                    inputKTP.click();
                };
                inputKTP.onchange = function(e) {
                    previewKTP(e.target.files[0]);
                };
            }
        }, 300);
    }
    /* ===== AKHIR BLOK 4.5.1 ===== */

    /* ===== BLOK 4.5.2 - SIMPAN DATA PRIBADI UMUM ===== */
    /*
        Fungsi ini menyimpan data pribadi dan rekening dari form profil umum
        ke localStorage dan database akun.
    */
    function simpanDataPribadiUmum() {
        var user = JSON.parse(localStorage.getItem('2r_user'));
        var dataAkun = getDataAkun();
        
        user.nama = document.getElementById('profilNama').value;
        user.email = document.getElementById('profilEmail').value;
        user.nomorHp = document.getElementById('profilHp').value;
        user.alamat = document.getElementById('profilAlamat').value;
        user.namaBank = document.getElementById('profilBank').value;
        user.nomorRekening = document.getElementById('profilRekening').value;
        user.pemilikRekening = document.getElementById('profilPemilikRek').value;
        
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === user.id) {
                dataAkun[i].nama = user.nama;
                dataAkun[i].email = user.email;
                dataAkun[i].nomorHp = user.nomorHp;
                dataAkun[i].alamat = user.alamat;
                dataAkun[i].namaBank = user.namaBank;
                dataAkun[i].nomorRekening = user.nomorRekening;
                dataAkun[i].pemilikRekening = user.pemilikRekening;
                break;
            }
        }
        
        localStorage.setItem('2r_user', JSON.stringify(user));
        simpanDataAkun(dataAkun);
        document.getElementById('userNama').textContent = user.nama;
        tampilkanToast('Data pribadi dan rekening disimpan!', 'success');
    }
    /* ===== AKHIR BLOK 4.5.2 ===== */

    /* ===== BLOK 4.5.3 - PREVIEW KTP ===== */
    /*
        Fungsi ini menampilkan preview gambar KTP saat user memilih file.
    */
    function previewKTP(file) {
        if (!file) {
            return;
        }
        var pembaca = new FileReader();
        pembaca.onload = function(e) {
            document.getElementById('ktpPreview').innerHTML = '<img src="' + e.target.result + '" class="preview-image">';
            localStorage.setItem('2r_ktp_temp', e.target.result);
        };
        pembaca.readAsDataURL(file);
    }
    /* ===== AKHIR BLOK 4.5.3 ===== */

    /* ===== BLOK 4.5.4 - SIMPAN KTP ===== */
    /*
        Fungsi ini menyimpan gambar KTP yang sudah di-preview ke database akun.
    */
    function simpanKTP() {
        var ktp = localStorage.getItem('2r_ktp_temp');
        if (!ktp) {
            tampilkanToast('Upload KTP dulu!', 'warning');
            return;
        }
        var user = JSON.parse(localStorage.getItem('2r_user'));
        var dataAkun = getDataAkun();
        user.ktp = ktp;
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === user.id) {
                dataAkun[i].ktp = ktp;
                break;
            }
        }
        localStorage.setItem('2r_user', JSON.stringify(user));
        simpanDataAkun(dataAkun);
        localStorage.removeItem('2r_ktp_temp');
        tampilkanToast('KTP disimpan!', 'success');
    }
    /* ===== AKHIR BLOK 4.5.4 ===== */
</script>

<script>
    /* ===== BLOK 4.6.1 - RENDER FORM DAFTAR AKUN BARU ===== */
    /*
        Fungsi ini menampilkan halaman "Daftar Akun Baru" khusus untuk SuperAdmin.
        Form ini berisi:
        - Pilihan Role.
        - ID Akun (otomatis, tidak bisa diedit).
        - Username, Password, dan Nama Lengkap.
        - Tombol "Buat Akun Baru".
    */
    function renderDaftarAkun() {
        var areaKonten = document.getElementById('mainContent');
        var html = '';
        
        html += '<div class="page-header">';
        html += '<h2>Daftar Akun Baru</h2>';
        html += '<p>Form pendaftaran akun oleh SuperAdmin.</p>';
        html += '</div>';
        
        html += '<div class="card"><div class="card-header">Form Pendaftaran</div>';
        html += '<div class="form-group"><label>Role</label><select id="daftarRole" class="form-input" onchange="updatePreviewId()"><option value="customer">Customer</option><option value="toko">Toko (Verifikasi)</option><option value="ojek">Ojek (Verifikasi)</option><option value="pedagang">Pedagang Pasar</option><option value="staf_admin">Staf Admin</option><option value="staf_owner_ojek">Staf Owner Ojek</option><option value="staf_owner_toko">Staf Owner Toko</option><option value="customer_service">Customer Service</option><option value="sponsor">Sponsor</option></select></div>';
        html += '<div class="form-group"><label>ID Akun (Otomatis)</label><div style="background:#f0f0f0;border:2px solid #ddd;border-radius:8px;padding:12px;"><span id="daftarIdPreview" style="font-weight:600;">' + generateId('customer') + '</span></div></div>';
        html += '<div class="form-group"><label>Username</label><input type="text" id="daftarUsername" class="form-input" placeholder="Username" required></div>';
        html += '<div class="form-group"><label>Password</label><input type="password" id="daftarPassword" class="form-input" placeholder="Password" required></div>';
        html += '<div class="form-group"><label>Nama Lengkap</label><input type="text" id="daftarNama" class="form-input" placeholder="Nama Lengkap" required></div>';
        html += '<button class="button button-primary" style="width:100%;" onclick="prosesDaftarAkun()"><i class="fas fa-user-plus"></i> Buat Akun Baru</button></div>';
        
        areaKonten.innerHTML = html;
    }
    /* ===== AKHIR BLOK 4.6.1 ===== */

    /* ===== BLOK 4.6.2 - UPDATE PREVIEW ID OTOMATIS ===== */
    /*
        Fungsi ini memperbarui tampilan ID otomatis di form
        saat SuperAdmin mengganti pilihan Role.
    */
    function updatePreviewId() {
        var roleTerpilih = document.getElementById('daftarRole').value;
        document.getElementById('daftarIdPreview').textContent = generateId(roleTerpilih);
    }
    /* ===== AKHIR BLOK 4.6.2 ===== */

    /* ===== BLOK 4.6.3 - PROSES DAFTAR AKUN BARU ===== */
    /*
        Fungsi ini memproses pendaftaran akun baru oleh SuperAdmin.
        Melakukan validasi:
        - Data wajib diisi.
        - Username minimal 4 karakter.
        - Password minimal 6 karakter.
        - Username belum digunakan.
        Jika valid, akun disimpan ke localStorage.
    */
    function prosesDaftarAkun() {
        var roleTerpilih = document.getElementById('daftarRole').value;
        var usernameBaru = document.getElementById('daftarUsername').value.trim();
        var passwordBaru = document.getElementById('daftarPassword').value.trim();
        var namaBaru = document.getElementById('daftarNama').value.trim();
        
        // Validasi data wajib
        if (!roleTerpilih || !usernameBaru || !passwordBaru || !namaBaru) {
            tampilkanToast('Data belum lengkap!', 'warning');
            return;
        }
        
        // Validasi panjang username
        if (usernameBaru.length < 4) {
            tampilkanToast('Username minimal 4 karakter!', 'warning');
            return;
        }
        
        // Validasi panjang password
        if (passwordBaru.length < 6) {
            tampilkanToast('Password minimal 6 karakter!', 'warning');
            return;
        }
        
        // Cek apakah username sudah digunakan
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].username === usernameBaru) {
                tampilkanToast('Username sudah digunakan!', 'error');
                return;
            }
        }
        
        // Tentukan status akun (Toko dan Ojek butuh verifikasi)
        var statusAkunBaru = '';
        if (roleTerpilih === 'toko' || roleTerpilih === 'ojek') {
            statusAkunBaru = 'NONAKTIF (Menunggu Verifikasi)';
        } else {
            statusAkunBaru = 'AKTIF';
        }
        
        // Buat objek akun baru
        var akunBaru = {
            id: generateId(roleTerpilih),
            role: roleTerpilih,
            username: usernameBaru,
            password: encodePassword(passwordBaru),
            nama: namaBaru,
            email: '',
            nomorHp: '',
            alamat: '',
            namaBank: '',
            nomorRekening: '',
            pemilikRekening: '',
            ktp: '',
            status: statusAkunBaru,
            waktuRegistrasi: new Date().toISOString()
        };
        
        // Simpan ke database
        dataAkun.push(akunBaru);
        simpanDataAkun(dataAkun);
        
        // Reset form
        document.getElementById('daftarUsername').value = '';
        document.getElementById('daftarPassword').value = '';
        document.getElementById('daftarNama').value = '';
        updatePreviewId();
        
        tampilkanToast('Akun ' + roleTerpilih + ' berhasil dibuat! ID: ' + akunBaru.id, 'success');
    }
    /* ===== AKHIR BLOK 4.6.3 ===== */
</script>

<script>
    /* ===== BLOK 4.7.1 - RENDER HALAMAN PERSETUJUAN AKUN ===== */
    /*
        Fungsi ini menampilkan daftar akun yang membutuhkan persetujuan.
        Hanya role selain SuperAdmin dan Customer yang ditampilkan.
        Status akun ditampilkan dalam bentuk badge (Aktif / Menunggu).
    */
    function renderPersetujuanAkun() {
        var areaKonten = document.getElementById('mainContent');
        if (!areaKonten) {
            return;
        }

        var dataAkun = getDataAkun();
        var daftarAkunNonCustomer = [];
        
        // Filter: hanya role selain superadmin dan customer
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].role !== 'superadmin' && dataAkun[i].role !== 'customer') {
                daftarAkunNonCustomer.push(dataAkun[i]);
            }
        }

        var html = '';
        html += '<div class="page-header"><h2>Persetujuan Akun</h2><p>Daftar akun yang membutuhkan persetujuan.</p></div>';
        html += '<div class="card"><div class="card-header"><span>Daftar Permintaan</span><span>Total: ' + daftarAkunNonCustomer.length + ' akun</span></div>';

        if (daftarAkunNonCustomer.length === 0) {
            html += '<div class="empty-state"><i class="fas fa-check-circle" style="color:#4CAF50;"></i><h3>Tidak ada akun menunggu</h3></div>';
        } else {
            html += '<div class="table-container"><table class="table"><thead><tr><th>ID</th><th>Role</th><th>Username</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
            for (var i = 0; i < daftarAkunNonCustomer.length; i++) {
                var akun = daftarAkunNonCustomer[i];
                var badgeStatus = akun.status === 'AKTIF' ? 'badge-success' : 'badge-warning';
                var teksStatus = akun.status === 'AKTIF' ? 'AKTIF' : 'Menunggu';
                html += '<tr><td>' + akun.id + '</td><td>' + akun.role + '</td><td>' + akun.username + '</td><td>' + akun.nama + '</td><td><span class="badge ' + badgeStatus + '">' + teksStatus + '</span></td><td>';
                if (akun.status !== 'AKTIF') {
                    html += '<button class="button button-success button-extra-small" onclick="setujuiAkun(\'' + akun.id + '\')">Setujui</button>';
                    html += '<button class="button button-danger button-extra-small" onclick="bukaTolakAkun(\'' + akun.id + '\')">Tolak</button>';
                } else {
                    html += '<span style="color:#888;">Sudah Aktif</span>';
                }
                html += '</td></tr>';
            }
            html += '</tbody></table></div>';
        }
        html += '</div>';
        areaKonten.innerHTML = html;
    }
    /* ===== AKHIR BLOK 4.7.1 ===== */

    /* ===== BLOK 4.7.2 - SETUJUI AKUN ===== */
    /*
        Fungsi ini mengubah status akun menjadi 'AKTIF'.
    */
    function setujuiAkun(idAkun) {
        if (!confirm('Setujui akun ini?')) {
            return;
        }
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === idAkun) {
                dataAkun[i].status = 'AKTIF';
                break;
            }
        }
        simpanDataAkun(dataAkun);
        renderPersetujuanAkun();
        tampilkanToast('Akun diaktifkan!', 'success');
    }
    /* ===== AKHIR BLOK 4.7.2 ===== */

    /* ===== BLOK 4.7.3 - BUKA MODAL TOLAK AKUN ===== */
    /*
        Fungsi ini membuka modal konfirmasi untuk menolak akun.
        ID akun yang akan ditolak disimpan di input hidden.
    */
    function bukaTolakAkun(idAkun) {
        document.getElementById('tolakIdAkun').value = idAkun;
        bukaModal('modalTolakAkun');
    }
    /* ===== AKHIR BLOK 4.7.3 ===== */

    /* ===== BLOK 4.7.4 - EKSEKUSI TOLAK AKUN ===== */
    /*
        Fungsi ini menghapus akun dari database (ditolak).
        Dipanggil saat tombol "Ya, Tolak" di modal diklik.
    */
    function eksekusiTolakAkun() {
        var idAkun = document.getElementById('tolakIdAkun').value;
        var dataAkun = getDataAkun();
        var dataAkunBaru = [];
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id !== idAkun) {
                dataAkunBaru.push(dataAkun[i]);
            }
        }
        simpanDataAkun(dataAkunBaru);
        tutupModal('modalTolakAkun');
        renderPersetujuanAkun();
        tampilkanToast('Akun ditolak!', 'success');
    }
    /* ===== AKHIR BLOK 4.7.4 ===== */
</script>

<script>

    function renderKelolaAkun() {
        var role = localStorage.getItem('2r_user_role');

        } else {

            for (var i = 0; i < daftarAkun.length; i++) {
                var akun = daftarAkun[i];
                var badgeStatus = akun.status === 'AKTIF' ? 'badge-success' :
                                  (akun.status === 'NONAKTIF (Menunggu Verifikasi)' ? 'badge-warning' : 'badge-danger');
                var teksStatus = akun.status === 'AKTIF' ? 'AKTIF' :
                                 (akun.status === 'NONAKTIF (Menunggu Verifikasi)' ? 'Menunggu' : 'Nonaktif');

                    html += '<button class="button button-warning button-extra-small" onclick="nonaktifkanAkun(\'' + akun.id + '\')">Nonaktifkan (Suspen)</button>';
                }
                if (role === 'superadmin') {
                    html += '<button class="button button-danger button-extra-small" onclick="hapusAkun(\'' + akun.id + '\')">Hapus</button>';
                } else if (role === 'staf_admin') {
                    html += '<button class="button button-danger button-extra-small" style="background:#FF9800;" onclick="ajukanHapusAkunStaf(\'' + akun.id + '\')">Ajukan Hapus</button>';

        html += '</div>';
        areaKonten.innerHTML = html;

    /* ===== AKHIR BLOK 4.8.1 ===== */

    /* ===== BLOK 4.8.2 - AKTIFKAN AKUN ===== */
    function aktifkanAkun(idAkun) {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'superadmin' && role !== 'staf_admin') {
            tampilkanToast('Anda tidak memiliki hak untuk mengaktifkan akun!', 'error');
            return;
        }
        if (!confirm('Aktifkan akun ini?')) {
            return;
        }
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === idAkun) {
                dataAkun[i].status = 'AKTIF';
                break;
            }
        }
        simpanDataAkun(dataAkun);
        renderKelolaAkun();
        tampilkanToast('Akun diaktifkan!', 'success');
    }
    /* ===== AKHIR BLOK 4.8.2 ===== */

    /* ===== BLOK 4.8.3 - NONAKTIFKAN AKUN (SUSPEN) ===== */
    function nonaktifkanAkun(idAkun) {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'superadmin') {
            tampilkanToast('Hanya SuperAdmin yang dapat menonaktifkan (suspen) akun!', 'error');
            return;
        }
        if (!confirm('Nonaktifkan (suspen) akun ini?')) {
            return;
        }
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === idAkun) {
                dataAkun[i].status = 'NONAKTIF (Disuspen)';
                break;
            }
        }
        simpanDataAkun(dataAkun);
        renderKelolaAkun();
        tampilkanToast('Akun dinonaktifkan (suspen)!', 'success');
    }
    /* ===== AKHIR BLOK 4.8.3 ===== */

    /* ===== BLOK 4.8.4 - HAPUS AKUN (HANYA SUPERADMIN) ===== */
    function hapusAkun(idAkun) {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'superadmin') {
            tampilkanToast('Hanya SuperAdmin yang dapat menghapus akun permanen!', 'error');
            return;
        }
        if (!confirm('HAPUS permanen akun ini?')) {
            return;
        }
        if (!confirm('KONFIRMASI: Yakin hapus?')) {
            return;
        }
        var dataAkun = getDataAkun();
        var dataAkunBaru = [];
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id !== idAkun) {
                dataAkunBaru.push(dataAkun[i]);
            }
        }
        simpanDataAkun(dataAkunBaru);
        renderKelolaAkun();
        tampilkanToast('Akun dihapus!', 'success');
    }
    /* ===== AKHIR BLOK 4.8.4 ===== */

    /* ===== BLOK 4.8.5 - AJUKAN HAPUS AKUN OLEH STAF ADMIN ===== */
    function ajukanHapusAkunStaf(idAkun) {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'staf_admin') {
            tampilkanToast('Anda tidak memiliki hak untuk mengajukan penghapusan!', 'error');
            return;
        }
        if (!confirm('Ajukan penghapusan akun ini ke SuperAdmin?')) {
            return;
        }
        var dataAkun = getDataAkun();
        var targetAkun = null;
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === idAkun) {
                targetAkun = dataAkun[i];
                break;
            }
        }
        if (!targetAkun) {
            tampilkanToast('Akun tidak ditemukan!', 'error');
            return;
        }
        var dataPengajuanStaf = JSON.parse(localStorage.getItem('2r_pengajuan_hapus_staf') || '[]');
        dataPengajuanStaf.push({
            id: Date.now(),
            targetId: targetAkun.id,
            targetUsername: targetAkun.username,
            targetNama: targetAkun.nama,
            targetRole: targetAkun.role,
            diajukanOleh: 'Staf Admin',
            status: 'MENUNGGU',
            diajukanPada: new Date().toISOString()
        });
        localStorage.setItem('2r_pengajuan_hapus_staf', JSON.stringify(dataPengajuanStaf));
        renderKelolaAkun();
        tampilkanToast('Pengajuan penghapusan akun telah dikirim ke SuperAdmin!', 'success');
    }
    /* ===== AKHIR BLOK 4.8.5 ===== */
</script>

<script>
    /* ===== BLOK 4.10.1 - TOGGLE FORM LOGIN / REGISTER ===== */
    /*
        Fungsi ini digunakan untuk berpindah antara form Login dan Register.
        Parameter 'tipe' bernilai 'register' atau 'login'.
    */
    function toggleForm(tipe) {
        var elemenError = document.getElementById('authenticationError');
        if (elemenError) {
            elemenError.style.display = 'none';
        }
        
        var formLogin = document.getElementById('loginForm');
        var formRegister = document.getElementById('registerForm');
        
        if (tipe === 'register') {
            formLogin.classList.add('hidden-form');
            formRegister.classList.remove('hidden-form');
        } else {
            formRegister.classList.add('hidden-form');
            formLogin.classList.remove('hidden-form');
        }
    }
    /* ===== AKHIR BLOK 4.10.1 ===== */

    /* ===== BLOK 4.10.2 - EVENT LOGIN SUBMIT ===== */
    /*
        Event listener saat tombol "Masuk" ditekan.
        Melakukan validasi username dan password terhadap data di localStorage.
        Jika valid, user diarahkan ke dashboard.
    */
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var usernameInput = document.getElementById('loginUsername').value.trim();
        var passwordInput = document.getElementById('loginPassword').value.trim();
        var dataAkun = getDataAkun();
        var userTerdaftar = null;
        
        // Cari user berdasarkan username dan password
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].username === usernameInput && 
                decodePassword(dataAkun[i].password) === passwordInput) {
                userTerdaftar = dataAkun[i];
                break;
            }
        }
        
        if (userTerdaftar) {
            // Cek apakah akun aktif (kecuali SuperAdmin)
            if (userTerdaftar.status !== 'AKTIF' && userTerdaftar.role !== 'superadmin') {
                var elemenError = document.getElementById('authenticationError');
                elemenError.style.display = 'block';
                document.getElementById('authenticationErrorText').textContent = 'Akun belum aktif. Menunggu verifikasi admin.';
                return;
            }
            
            // Simpan data user ke session
            localStorage.setItem('2r_user', JSON.stringify(userTerdaftar));
            localStorage.setItem('2r_user_role', userTerdaftar.role);
            
            // Tampilkan dashboard
            tampilkanDashboard(userTerdaftar);
        } else {
            var elemenError = document.getElementById('authenticationError');
            elemenError.style.display = 'block';
            document.getElementById('authenticationErrorText').textContent = 'Username atau password salah!';
        }
    });
    /* ===== AKHIR BLOK 4.10.2 ===== */

    /* ===== BLOK 4.10.3 - EVENT REGISTER SUBMIT ===== */
    /*
        Event listener saat tombol "Daftar" ditekan.
        Melakukan validasi data, cek ketersediaan username,
        lalu menyimpan akun baru ke localStorage.
    */
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var roleTerpilih = document.getElementById('registerRole').value;
        var usernameBaru = document.getElementById('registerUsername').value.trim();
        var passwordBaru = document.getElementById('registerPassword').value.trim();
        var namaBaru = document.getElementById('registerNama').value.trim();
        
        if (!roleTerpilih || !usernameBaru || !passwordBaru || !namaBaru) {
            tampilkanToast('Data belum lengkap!', 'warning');
            return;
        }
        
        var dataAkun = getDataAkun();
        
        // Cek apakah username sudah digunakan
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].username === usernameBaru) {
                tampilkanToast('Username sudah digunakan!', 'error');
                return;
            }
        }
        
        // Tentukan status akun awal
        var statusAwal = '';
        if (roleTerpilih === 'toko' || roleTerpilih === 'ojek') {
            statusAwal = 'NONAKTIF (Menunggu Verifikasi)';
        } else {
            statusAwal = 'AKTIF';
        }
        
        // Buat objek akun baru
        var akunBaru = {
            id: generateId(roleTerpilih),
            role: roleTerpilih,
            username: usernameBaru,
            password: encodePassword(passwordBaru),
            nama: namaBaru,
            email: '',
            nomorHp: '',
            alamat: '',
            namaBank: '',
            nomorRekening: '',
            pemilikRekening: '',
            status: statusAwal,
            waktuRegistrasi: new Date().toISOString()
        };
        
        dataAkun.push(akunBaru);
        simpanDataAkun(dataAkun);
        
        tampilkanToast('Akun berhasil dibuat! ID: ' + akunBaru.id + '\nStatus: ' + statusAwal, 'success');
        toggleForm('login');
    });
    /* ===== AKHIR BLOK 4.10.3 ===== */

    /* ===== BLOK 4.10.4 - EVENT UPDATE ID OTOMATIS ===== */
    /*
        Event listener saat user mengganti pilihan Role di form Register.
        ID preview akan langsung berubah sesuai role yang dipilih.
    */
    document.getElementById('registerRole').addEventListener('change', function() {
        var roleTerpilih = this.value;
        var elemenIdPreview = document.getElementById('registerIdPreview');
        if (elemenIdPreview) {
            elemenIdPreview.value = generateId(roleTerpilih);
        }
    });
    /* ===== AKHIR BLOK 4.10.4 ===== */
	/* ===== BLOK 4.10.5 - EVENT LUPA PASSWORD ===== */
/*
    Event listener saat tombol "Lupa Password" diklik.
    Mengirim email reset password ke user.
*/
document.getElementById('tombolLupaPassword').addEventListener('click', function() {
    var username = document.getElementById('loginUsername').value.trim();
    if (!username) {
        tampilkanToast('Masukkan username terlebih dahulu!', 'warning');
        return;
    }
    // Logika kirim email reset password...
    tampilkanToast('Link reset password telah dikirim ke email Anda!', 'success');
});
/* ===== AKHIR BLOK 4.10.5 ===== */
</script>

<!-- ===== BLOK 4.11 - JS_RENDER_TRANSFER_MENU (REVISI) ===== -->
<script>
    /* ===== BLOK 4.11.1 - HALAMAN INDUK TRANSFER MENU ===== */
    /*
        Halaman utama Transfer Menu.
        Menampilkan 3 tombol kategori:
        1. Transfer Upload Produk Publik
        2. Transfer Transaksi
        3. Transfer Menu Lainnya
    */
    function renderTransferMenu() {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'superadmin') {
            tampilkanToast('Anda tidak memiliki akses ke halaman ini!', 'error');
            return;
        }

        var areaKonten = document.getElementById('mainContent');
        var html = '';
        html += '<div class="page-header"><h2>Transfer Menu</h2><p>Pilih kategori menu yang ingin Anda transfer ke akun target.</p></div>';
        html += '<div class="widget-grid">';
        html += '<div class="widget-card" style="cursor:pointer;" onclick="renderTransferUploadProduk()">';
        html += '<div class="widget-icon" style="color:#FF6B00;"><i class="fas fa-upload"></i></div>';
        html += '<div class="widget-number" style="font-size:18px;">Upload Produk Publik</div>';
        html += '<div class="widget-label">Atur akses upload produk untuk toko</div>';
        html += '</div>';
        
        html += '<div class="widget-card" style="cursor:pointer;" onclick="renderTransferTransaksi()">';
        html += '<div class="widget-icon" style="color:#2196F3;"><i class="fas fa-credit-card"></i></div>';
        html += '<div class="widget-number" style="font-size:18px;">Transaksi</div>';
        html += '<div class="widget-label">Atur akses kasir, pembayaran, laporan</div>';
        html += '</div>';
        
        html += '<div class="widget-card" style="cursor:pointer;" onclick="renderTransferLainnya()">';
        html += '<div class="widget-icon" style="color:#4CAF50;"><i class="fas fa-cogs"></i></div>';
        html += '<div class="widget-number" style="font-size:18px;">Menu Lainnya</div>';
        html += '<div class="widget-label">Atur akses menu tambahan lainnya</div>';
        html += '</div>';
        html += '</div>';
        areaKonten.innerHTML = html;
    }
    /* ===== AKHIR BLOK 4.11.1 ===== */

    /* ===== BLOK 4.11.2 - TRANSFER UPLOAD PRODUK PUBLIK ===== */
    /*
        Halaman Transfer Upload Produk Publik.
        Menampilkan daftar semua akun dengan role 'toko'.
        SuperAdmin bisa mengaktifkan atau menonaktifkan fitur upload produk publik.
    */
    function renderTransferUploadProduk() {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'superadmin') {
            tampilkanToast('Anda tidak memiliki akses!', 'error');
            return;
        }

        var areaKonten = document.getElementById('mainContent');
        var dataAkun = getDataAkun();
        var daftarToko = [];
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].role === 'toko') {
                daftarToko.push(dataAkun[i]);
            }
        }

        var html = '';
        html += '<div class="page-header"><h2>Transfer Upload Produk Publik</h2><p>Pilih toko yang ingin Anda aktifkan/nonaktifkan fitur upload produk publik.</p>';
        html += '<button class="button button-primary button-small" onclick="renderTransferMenu()"><i class="fas fa-arrow-left"></i> Kembali</button>';
        html += '</div>';
        html += '<div class="card"><div class="card-header">Daftar Toko <span style="font-weight:normal;font-size:13px;color:#888;">(Total: ' + daftarToko.length + ')</span></div>';
        
        if (daftarToko.length === 0) {
            html += '<div class="empty-state"><i class="fas fa-store"></i><h3>Belum ada toko</h3></div>';
        } else {
            html += '<div class="table-container"><table class="table"><thead><tr><th>Nomor</th><th>ID</th><th>Username</th><th>Nama</th><th>Status Upload Publik</th><th>Aksi</th></tr></thead><tbody>';
            for (var i = 0; i < daftarToko.length; i++) {
                var toko = daftarToko[i];
                var statusUpload = toko.fitur && toko.fitur.uploadProdukPublik ? 'Aktif' : 'Nonaktif';
                var badgeUpload = statusUpload === 'Aktif' ? 'badge-success' : 'badge-danger';
                html += '<tr><td>' + (i+1) + '</td><td>' + toko.id + '</td><td>' + toko.username + '</td><td>' + toko.nama + '</td><td><span class="badge ' + badgeUpload + '">' + statusUpload + '</span></td><td>';
                if (statusUpload === 'Aktif') {
                    html += '<button class="button button-danger button-extra-small" onclick="nonaktifkanUploadPublik(\'' + toko.id + '\')">Nonaktifkan</button>';
                } else {
                    html += '<button class="button button-success button-extra-small" onclick="aktifkanUploadPublik(\'' + toko.id + '\')">Aktifkan</button>';
                }
                html += '</td></tr>';
            }
            html += '</tbody></table></div>';
        }
        html += '</div>';
        areaKonten.innerHTML = html;
    }
    /* ===== AKHIR BLOK 4.11.2 ===== */

    /* ===== BLOK 4.11.3 - FUNGSI AKTIFKAN/NONAKTIFKAN UPLOAD PUBLIK ===== */
    function aktifkanUploadPublik(idToko) {
        if (!confirm('Aktifkan fitur Upload Produk Publik untuk toko ini?')) return;
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === idToko) {
                if (!dataAkun[i].fitur) dataAkun[i].fitur = {};
                dataAkun[i].fitur.uploadProdukPublik = true;
                break;
            }
        }
        simpanDataAkun(dataAkun);
        renderTransferUploadProduk();
        tampilkanToast('Fitur Upload Produk Publik telah diaktifkan!', 'success');
    }

    function nonaktifkanUploadPublik(idToko) {
        if (!confirm('Nonaktifkan fitur Upload Produk Publik untuk toko ini?')) return;
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === idToko) {
                if (dataAkun[i].fitur) {
                    dataAkun[i].fitur.uploadProdukPublik = false;
                }
                break;
            }
        }
        simpanDataAkun(dataAkun);
        renderTransferUploadProduk();
        tampilkanToast('Fitur Upload Produk Publik telah dinonaktifkan!', 'success');
    }
    /* ===== AKHIR BLOK 4.11.3 ===== */

    /* ===== BLOK 4.11.4 - TRANSFER TRANSAKSI (PLACEHOLDER) ===== */
    function renderTransferTransaksi() {
        var areaKonten = document.getElementById('mainContent');
        var html = '';
        html += '<div class="page-header"><h2>Transfer Transaksi</h2><p>Halaman ini sedang dalam pengembangan.</p>';
        html += '<button class="button button-primary button-small" onclick="renderTransferMenu()"><i class="fas fa-arrow-left"></i> Kembali</button>';
        html += '</div>';
        html += '<div class="card"><div class="empty-state"><i class="fas fa-tools" style="color:#FF9800;"></i><h3>Fitur Transfer Transaksi</h3><p>Segera hadir.</p></div></div>';
        areaKonten.innerHTML = html;
    }
    /* ===== AKHIR BLOK 4.11.4 ===== */

    /* ===== BLOK 4.11.5 - TRANSFER MENU LAINNYA (PLACEHOLDER) ===== */
    function renderTransferLainnya() {
        var areaKonten = document.getElementById('mainContent');
        var html = '';
        html += '<div class="page-header"><h2>Transfer Menu Lainnya</h2><p>Halaman ini sedang dalam pengembangan.</p>';
        html += '<button class="button button-primary button-small" onclick="renderTransferMenu()"><i class="fas fa-arrow-left"></i> Kembali</button>';
        html += '</div>';
        html += '<div class="card"><div class="empty-state"><i class="fas fa-tools" style="color:#FF9800;"></i><h3>Fitur Transfer Menu Lainnya</h3><p>Segera hadir.</p></div></div>';
        areaKonten.innerHTML = html;
    }
    /* ===== AKHIR BLOK 4.11.5 ===== */
</script>

<script>
/* ===== BLOK 4.12 - JS_RENDER_KELOLA_WILAYAH (SUPERADMIN) ===== */
/*
    Blok ini berisi fungsi untuk menampilkan halaman Kelola Wilayah 
    serta fungsi CRUD (Tambah, Edit, Hapus) data wilayah.
    Data wilayah disimpan di localStorage dengan kunci '2r_data_wilayah'.
*/

// ===== 4.12.1 - RENDER HALAMAN KELOLA WILAYAH =====
/*
    Fungsi ini menampilkan halaman Kelola Wilayah untuk SuperAdmin.
    SuperAdmin dapat menambahkan, mengedit, atau menghapus data wilayah
    (Provinsi, Kabupaten, Kecamatan, Kelurahan, Kode Pos).
    Data ini akan digunakan oleh semua akun saat mengisi alamat.
*/
function renderKelolaWilayah() {
    // Ambil elemen konten utama
    var areaKonten = document.getElementById('mainContent');
    
    // Ambil data wilayah dari localStorage
    var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
    
    // Variabel untuk menampung HTML
    var html = '';

    // ==========================================================
    // HEADER HALAMAN
    // ==========================================================
    html += '<div class="page-header">';
    html += '<h2>Kelola Wilayah Indonesia</h2>';
    html += '<p>SuperAdmin dapat menambahkan, mengedit, atau menghapus data wilayah (Provinsi, Kabupaten, Kecamatan, Kelurahan, Kode Pos). Data ini akan digunakan oleh semua akun saat mengisi alamat.</p>';
    html += '</div>';

    // ==========================================================
    // FORM TAMBAH WILAYAH
    // ==========================================================
    html += '<div class="card">';
    html += '<div class="card-header">Tambah Wilayah Baru</div>';
    html += '<div class="grid-2">';
    html += '<div><label class="form-label">Provinsi</label><input type="text" id="wilProvinsi" class="form-input" placeholder="Contoh: DKI Jakarta"></div>';
    html += '<div><label class="form-label">Kabupaten / Kota</label><input type="text" id="wilKabupaten" class="form-input" placeholder="Contoh: Jakarta Pusat"></div>';
    html += '<div><label class="form-label">Kecamatan</label><input type="text" id="wilKecamatan" class="form-input" placeholder="Contoh: Gambir"></div>';
    html += '<div><label class="form-label">Kelurahan / Desa</label><input type="text" id="wilDesa" class="form-input" placeholder="Contoh: Gambir"></div>';
    html += '<div><label class="form-label">Kode Pos</label><input type="text" id="wilKodepos" class="form-input" placeholder="Contoh: 10230"></div>';
    html += '</div>';
    html += '<button class="button button-primary margin-top-10" onclick="tambahWilayah()"><i class="fas fa-plus"></i> Tambah Wilayah</button>';
    html += '</div>';

    // ==========================================================
    // DAFTAR WILAYAH YANG SUDAH ADA
    // ==========================================================
    html += '<div class="card">';
    html += '<div class="card-header">Daftar Wilayah Tersimpan <span style="font-weight:normal;font-size:13px;color:#888;">(Total: ' + dataWilayah.length + ' data)</span></div>';
    
    if (dataWilayah.length === 0) {
        // Jika belum ada data
        html += '<div class="empty-state"><i class="fas fa-map"></i><h3>Belum ada data wilayah</h3><p>Silakan tambahkan wilayah baru.</p></div>';
    } else {
        // Jika sudah ada data, tampilkan dalam tabel
        html += '<div class="table-container"><table class="table"><thead><tr><th>No</th><th>Provinsi</th><th>Kabupaten</th><th>Kecamatan</th><th>Kelurahan</th><th>Kode Pos</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < dataWilayah.length; i++) {
            var w = dataWilayah[i];
            html += '<tr><td>' + (i+1) + '</td><td>' + w.provinsi + '</td><td>' + w.kabupaten + '</td><td>' + w.kecamatan + '</td><td>' + w.desa + '</td><td>' + (w.kodepos || '-') + '</td><td>';
            html += '<button class="button button-primary button-extra-small" onclick="editWilayah(' + i + ')"><i class="fas fa-edit"></i> Edit</button>';
            html += '<button class="button button-danger button-extra-small" onclick="hapusWilayah(' + i + ')"><i class="fas fa-trash"></i> Hapus</button>';
            html += '</td></tr>';
        }
        html += '</tbody></table></div>';
    }
    html += '</div>';

    // ==========================================================
    // TAMPILKAN KE AREA KONTEN
    // ==========================================================
    areaKonten.innerHTML = html;
}
/* ===== AKHIR BLOK 4.12.1 ===== */


// ===== 4.12.2 - FUNGSI CRUD WILAYAH =====

// ===== 4.12.2.1 - TAMBAH WILAYAH BARU =====
/*
    Fungsi ini menambahkan data wilayah baru ke localStorage.
    Data yang diinput: Provinsi, Kabupaten, Kecamatan, Kelurahan, Kode Pos.
    Validasi:
    - Semua field wajib diisi.
    - Tidak boleh ada duplikasi data.
*/
function tambahWilayah() {
    // Ambil nilai dari form input
    var provinsi = document.getElementById('wilProvinsi').value.trim();
    var kabupaten = document.getElementById('wilKabupaten').value.trim();
    var kecamatan = document.getElementById('wilKecamatan').value.trim();
    var desa = document.getElementById('wilDesa').value.trim();
    var kodepos = document.getElementById('wilKodepos').value.trim();

    // Validasi: semua field wajib diisi
    if (!provinsi || !kabupaten || !kecamatan || !desa || !kodepos) {
        tampilkanToast('Semua data wajib diisi!', 'warning');
        return;
    }

    // Ambil data yang sudah ada
    var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
    
    // Cek duplikasi (case insensitive)
    for (var i = 0; i < dataWilayah.length; i++) {
        if (dataWilayah[i].provinsi.toLowerCase() === provinsi.toLowerCase() && 
            dataWilayah[i].kabupaten.toLowerCase() === kabupaten.toLowerCase() && 
            dataWilayah[i].kecamatan.toLowerCase() === kecamatan.toLowerCase() && 
            dataWilayah[i].desa.toLowerCase() === desa.toLowerCase()) {
            tampilkanToast('Data wilayah sudah ada!', 'warning');
            return;
        }
    }

    // Tambah data baru
    dataWilayah.push({
        id: Date.now(),
        provinsi: provinsi,
        kabupaten: kabupaten,
        kecamatan: kecamatan,
        desa: desa,
        kodepos: kodepos
    });

    // Simpan ke localStorage
    localStorage.setItem('2r_data_wilayah', JSON.stringify(dataWilayah));
    
    // Reset form
    document.getElementById('wilProvinsi').value = '';
    document.getElementById('wilKabupaten').value = '';
    document.getElementById('wilKecamatan').value = '';
    document.getElementById('wilDesa').value = '';
    document.getElementById('wilKodepos').value = '';

    // Refresh halaman
    renderKelolaWilayah();
    tampilkanToast('Wilayah berhasil ditambahkan!', 'success');
}

// ===== 4.12.2.2 - HAPUS WILAYAH =====
/*
    Fungsi ini menghapus data wilayah dari localStorage berdasarkan index.
    User akan dimintai konfirmasi sebelum menghapus.
*/
function hapusWilayah(index) {
    // Konfirmasi sebelum menghapus
    if (!confirm('Yakin ingin menghapus data wilayah ini?')) return;
    
    // Ambil data, hapus sesuai index, lalu simpan kembali
    var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
    dataWilayah.splice(index, 1);
    localStorage.setItem('2r_data_wilayah', JSON.stringify(dataWilayah));
    
    // Refresh halaman
    renderKelolaWilayah();
    tampilkanToast('Wilayah dihapus!', 'success');
}

// ===== 4.12.2.3 - EDIT WILAYAH =====
/*
    Fungsi ini mengedit data wilayah yang sudah ada menggunakan prompt.
    User dapat mengubah Provinsi, Kabupaten, Kecamatan, Kelurahan, atau Kode Pos.
*/
function editWilayah(index) {
    // Ambil data yang sudah ada
    var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
    var w = dataWilayah[index];

    // Minta input baru dari user melalui prompt
    var provinsiBaru = prompt('Provinsi:', w.provinsi);
    if (provinsiBaru === null) return; // Jika user klik Cancel
    
    var kabupatenBaru = prompt('Kabupaten/Kota:', w.kabupaten);
    if (kabupatenBaru === null) return;
    
    var kecamatanBaru = prompt('Kecamatan:', w.kecamatan);
    if (kecamatanBaru === null) return;
    
    var desaBaru = prompt('Kelurahan/Desa:', w.desa);
    if (desaBaru === null) return;
    
    var kodeposBaru = prompt('Kode Pos:', w.kodepos);
    if (kodeposBaru === null) return;

    // Update data
    dataWilayah[index].provinsi = provinsiBaru.trim();
    dataWilayah[index].kabupaten = kabupatenBaru.trim();
    dataWilayah[index].kecamatan = kecamatanBaru.trim();
    dataWilayah[index].desa = desaBaru.trim();
    dataWilayah[index].kodepos = kodeposBaru.trim();

    // Simpan kembali ke localStorage
    localStorage.setItem('2r_data_wilayah', JSON.stringify(dataWilayah));
    
    // Refresh halaman
    renderKelolaWilayah();
    tampilkanToast('Wilayah diperbarui!', 'success');
}
/* ===== AKHIR BLOK 4.12.2 ===== */
/* ===== AKHIR BLOK 4.12 ===== */
</script>

<script>
    /* ===== BLOK 5.1.1 - EVENT TOMBOL LOGOUT ===== */
    /*
        Event listener ini dipasang pada tombol logout di navbar.
        Saat diklik, akan menampilkan konfirmasi.
        Jika user menyetujui, session dihapus dan halaman di-reload.
    */
    var tombolLogout = document.getElementById('buttonLogout');
    if (tombolLogout) {
        tombolLogout.addEventListener('click', function() {
            if (confirm('Keluar dari aplikasi?')) {
                localStorage.removeItem('2r_user');
                localStorage.removeItem('2r_user_role');
                location.reload();
            }
        });
    }
    /* ===== AKHIR BLOK 5.1.1 ===== */

    /* ===== BLOK 5.1.2 - EVENT KLIK DI LUAR MODAL ===== */
    /*
        Event listener ini memastikan bahwa jika user mengklik area gelap
        di luar modal, modal akan tertutup secara otomatis.
    */
    var semuaModal = document.querySelectorAll('.modal-overlay');
    for (var i = 0; i < semuaModal.length; i++) {
        semuaModal[i].onclick = function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        };
    }
    /* ===== AKHIR BLOK 5.1.2 ===== */
</script>

<!-- ===== BLOK 5.2 - JS_EVENT_RESPONSIVE_SIDEBAR ===== -->
<script>
    /* ===== BLOK 5.2.1 - EVENT TOMBOL HAMBURGER & OVERLAY ===== */
    /*
        Event listener untuk tombol hamburger dan overlay.
        - Klik tombol hamburger: membuka sidebar (di HP).
        - Klik overlay (area gelap): menutup sidebar.
    */
    var tombolMenu = document.getElementById('menuToggle');
    var elemenSidebar = document.querySelector('.sidebar');
    var elemenOverlay = document.getElementById('sidebarOverlay');

    if (tombolMenu && elemenSidebar && elemenOverlay) {
        // Fungsi membuka sidebar
        function bukaSidebar() {
            elemenSidebar.classList.add('open');
            elemenOverlay.classList.add('active');
        }

        // Fungsi menutup sidebar
        function tutupSidebar() {
            elemenSidebar.classList.remove('open');
            elemenOverlay.classList.remove('active');
        }

        // Saat tombol hamburger diklik
        tombolMenu.addEventListener('click', function(e) {
            e.stopPropagation();
            if (elemenSidebar.classList.contains('open')) {
                tutupSidebar();
            } else {
                bukaSidebar();
            }
        });

        // Saat overlay diklik, sidebar menutup
        elemenOverlay.addEventListener('click', function() {
            tutupSidebar();
        });

        // Saat menu sidebar diklik di HP, sidebar otomatis menutup
        var semuaItemSidebar = document.querySelectorAll('.sidebar-menu-item');
        semuaItemSidebar.forEach(function(item) {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 767) {
                    tutupSidebar();
                }
            });
        });
    }
    /* ===== AKHIR BLOK 5.2.1 ===== */

    /* ===== BLOK 5.2.2 - EVENT RESIZE WINDOW ===== */
    /*
        Event listener saat ukuran layar berubah.
        Jika layar berubah dari HP ke PC, sidebar dipaksa terbuka dan overlay hilang.
    */
    window.addEventListener('resize', function() {
        if (window.innerWidth > 767) {
            // Di PC/Laptop, sidebar harus selalu terbuka, overlay hilang
            var elemenSidebar = document.querySelector('.sidebar');
            var elemenOverlay = document.getElementById('sidebarOverlay');
            if (elemenSidebar && elemenOverlay) {
                elemenSidebar.classList.remove('open');
                elemenOverlay.classList.remove('active');
            }
        }
    });
    /* ===== AKHIR BLOK 5.2.2 ===== */

<!-- ===== AKHIR BLOK 5.2 ===== -->
<script>
/* ===== BLOK 5.3 - JS_INIT_UTAMA ===== */

// ===== 5.3.1 - TAMPILKAN DASHBOARD SETELAH LOGIN =====
/*
    Fungsi ini dipanggil setelah user berhasil login.
    1. Menyembunyikan halaman Login/Register.
    2. Menampilkan halaman Dashboard.
    3. Mengisi nama user di navbar.
    4. Membangun sidebar sesuai role user.
    5. Memanggil setupNavigasiSidebar() agar sidebar bisa diklik.
    6. Menampilkan dashboard awal.
*/
function tampilkanDashboard(user) {
    // ===== 1. VALIDASI DATA USER =====
    // Jika data user tidak valid, hapus session dan reload halaman
    if (!user || !user.nama) {
        localStorage.removeItem('2r_user');
        localStorage.removeItem('2r_user_role');
        location.reload();
        return;
    }

    // ===== 2. SEMBUNYIKAN HALAMAN AUTH, TAMPILKAN DASHBOARD =====
    document.getElementById('pageAuthentication').style.display = 'none';
    document.getElementById('pageDashboard').style.display = 'block';
    
    // ===== 3. TAMPILKAN NAMA USER DI NAVBAR =====
    document.getElementById('userNama').textContent = user.nama;
    
    // ===== 4. TAMPILKAN ROLE BADGE =====
    var daftarRole = {
        superadmin: 'SuperAdmin',
        customer: 'Customer',
        toko: 'Toko',
        ojek: 'Ojek',
        pedagang: 'Pedagang Pasar',
        staf_admin: 'Staf Admin',
        customer_service: 'Customer Service',
        staf_owner_toko: 'Staf Owner Toko',
        staf_owner_ojek: 'Staf Owner Ojek',
        sponsor: 'Sponsor'
    };
    document.getElementById('roleBadge').textContent = daftarRole[user.role] || user.role;
    
    // ===== 5. BANGUN SIDEBAR =====
    // Sidebar akan diisi dengan menu yang sesuai dengan role user
    document.getElementById('sidebarContainer').innerHTML = buatSidebarHTML(user.role);
    
    // ===== 6. PANGGIL SETUP NAVIGASI SIDEBAR (PENTING!) =====
    /*
        Fungsi ini memberikan event listener ke setiap item menu di sidebar.
        Tanpa ini, menu sidebar tidak bisa diklik.
    */
    setupNavigasiSidebar();
    
    // ===== 7. TAMPILKAN DASHBOARD AWAL =====
    renderDashboard();
}
/* ===== AKHIR BLOK 5.3.1 ===== */


/* ===== BLOK 5.3.2 - INISIALISASI SAAT HALAMAN DIMUAT (DOMContentLoaded) ===== */
document.addEventListener('DOMContentLoaded', function() {
    
    // 1. Pastikan SuperAdmin selalu ada
    inisialisasiSuperAdmin();

    // 2. Cek apakah user sudah login
    var dataUser = localStorage.getItem('2r_user');
    if (dataUser) {
        var user = JSON.parse(dataUser);
        tampilkanDashboard(user);
    }
});
/* ===== AKHIR BLOK 5.3.2 ===== */

/* ===== AKHIR BLOK 5.3 ===== */
</script>
