<script>
// ===== FUNGSI DASAR =====
function getDataAkun() { var d = localStorage.getItem('2r_akun'); return d ? JSON.parse(d) : []; }
function simpanDataAkun(a) { localStorage.setItem('2r_akun', JSON.stringify(a)); }
function encodePassword(p) { return btoa(p); }
function decodePassword(p) { return atob(p); }

function inisialisasiSuperAdmin() {
    var akun = getDataAkun();
    if (!akun.find(function(a) { return a.role === 'superadmin'; })) {
        akun.push({
            id: 'SA-001', role: 'superadmin', username: 'admin', password: encodePassword('admin123'),
            nama: 'SuperAdmin', email: 'admin@2r.com', hp: '081234567890', alamat: 'Kantor Pusat',
            status: 'AKTIF', registeredAt: new Date().toISOString()
        });
        simpanDataAkun(akun);
    }
}

function generateId(role) {
    var akun = getDataAkun().filter(function(a) { return a.role === role; });
    var urut = 1;
    akun.forEach(function(a) { var p = a.id.split('-'); if (p.length === 2) { var n = parseInt(p[1]); if (n >= urut) urut = n + 1; } });
    var prefix = { customer:'CUST', toko:'TOKO', ojek:'OJEK', pedagang:'PEDAGANG', codseller:'COD', superadmin:'SA', staf_admin:'STA', staf_owner_ojek:'SOO', staf_owner_toko:'SOT', customer_service:'CS', sponsor:'SPN' };
    return (prefix[role] || 'USR') + '-' + String(urut).padStart(3, '0');
}

function tampilkanToast(pesan, tipe) {
    tipe = tipe || 'success';
    var t = document.createElement('div'); t.className = 'toast ' + tipe;
    var icon = tipe === 'success' ? 'fa-check-circle' : (tipe === 'error' ? 'fa-times-circle' : (tipe === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'));
    t.innerHTML = '<i class="fas ' + icon + '"></i> ' + pesan;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(function() { t.style.animation = 'slideInRight 0.3s ease reverse'; setTimeout(function() { t.remove(); }, 300); }, 3500);
}

function bukaModal(id) { var m = document.getElementById(id); if (m) m.classList.add('active'); }
function tutupModal(id) { var m = document.getElementById(id); if (m) m.classList.remove('active'); }
</script>

<!-- ===== BLOK 6 (2) - 02 AUTH & LOGIN ===== -->
<script>
function toggleForm(tipe) {
    document.getElementById('authError').style.display = 'none';
    if (tipe === 'register') { document.getElementById('loginForm').classList.add('hidden-form'); document.getElementById('registerForm').classList.remove('hidden-form'); }
    else { document.getElementById('registerForm').classList.add('hidden-form'); document.getElementById('loginForm').classList.remove('hidden-form'); }
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var u = document.getElementById('loginUsername').value.trim();
    var p = document.getElementById('loginPassword').value.trim();
    var user = getDataAkun().find(function(a) { return a.username === u && decodePassword(a.password) === p; });
    if (user) {
        if (user.status !== 'AKTIF' && user.role !== 'superadmin') {
            document.getElementById('authError').style.display = 'block';
            document.getElementById('authErrorText').textContent = 'Akun belum aktif. Menunggu verifikasi admin.';
            return;
        }
        localStorage.setItem('2r_user', JSON.stringify(user));
        localStorage.setItem('2r_user_role', user.role);
        tampilkanDashboard(user);
    } else {
        document.getElementById('authError').style.display = 'block';
        document.getElementById('authErrorText').textContent = 'Username atau password salah!';
    }
});

document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var role = document.getElementById('regRole').value;
    var username = document.getElementById('regUsername').value.trim();
    var password = document.getElementById('regPassword').value.trim();
    var nama = document.getElementById('regNama').value.trim();
    if (!role || !username || !password || !nama) { alert('Data belum lengkap!'); return; }
    var akun = getDataAkun();
    if (akun.find(function(a) { return a.username === username; })) { alert('Username sudah digunakan!'); return; }
    var statusAkun = (role === 'toko' || role === 'ojek') ? 'NONAKTIF (Menunggu Verifikasi)' : 'AKTIF';
    akun.push({ id: generateId(role), role: role, username: username, password: encodePassword(password), nama: nama, email: '', hp: '', alamat: '', status: statusAkun, registeredAt: new Date().toISOString() });
    simpanDataAkun(akun);
    alert('Akun berhasil dibuat! ID: ' + akun[akun.length-1].id + '\nStatus: ' + statusAkun);
    toggleForm('login');
});
</script>

<script>
function simpanDataAplikasi() {
    var data = { nama: document.getElementById('appNama').value, penerbit: document.getElementById('appPenerbit').value, pemilik: document.getElementById('appPemilik').value, pengelola: document.getElementById('appPengelola').value };
    localStorage.setItem('2r_data_aplikasi', JSON.stringify(data));
    tampilkanToast('Data aplikasi disimpan!', 'success');
}

function loadDataAplikasi() {
    var d = JSON.parse(localStorage.getItem('2r_data_aplikasi') || '{}');
    if (document.getElementById('appNama')) document.getElementById('appNama').value = d.nama || '';
    if (document.getElementById('appPenerbit')) document.getElementById('appPenerbit').value = d.penerbit || '';
    if (document.getElementById('appPemilik')) document.getElementById('appPemilik').value = d.pemilik || '';
    if (document.getElementById('appPengelola')) document.getElementById('appPengelola').value = d.pengelola || '';
}

function ubahPasswordSA() {
    var username = document.getElementById('saUsername').value.trim();
    var password = document.getElementById('saPassword').value.trim();
    var konfirmasi = document.getElementById('saPasswordKonfirmasi').value.trim();
    if (!username) { tampilkanToast('Username tidak boleh kosong!', 'warning'); return; }
    if (password && password !== konfirmasi) { tampilkanToast('Password tidak cocok!', 'error'); return; }
    if (password && password.length < 6) { tampilkanToast('Password minimal 6 karakter!', 'warning'); return; }
    
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.username = username;
    if (password) user.password = encodePassword(password);
    for (var i = 0; i < akun.length; i++) { if (akun[i].id === user.id) { akun[i].username = username; if (password) akun[i].password = encodePassword(password); break; } }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    document.getElementById('saPassword').value = '';
    document.getElementById('saPasswordKonfirmasi').value = '';
    tampilkanToast('Keamanan akun diperbarui!', 'success');
}

function simpanDataPribadiSA() {
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.nama = document.getElementById('saNama').value;
    user.alamat = document.getElementById('saAlamat').value;
    user.email = document.getElementById('saEmail').value;
    user.hp = document.getElementById('saHp').value;
    for (var i = 0; i < akun.length; i++) { if (akun[i].id === user.id) { akun[i].nama = user.nama; akun[i].alamat = user.alamat; akun[i].email = user.email; akun[i].hp = user.hp; break; } }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    document.getElementById('userNama').textContent = user.nama;
    tampilkanToast('Data pribadi disimpan!', 'success');
}

function uploadDokumenSA(files) {
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    var total = files.length, done = 0;
    for (var i = 0; i < files.length; i++) {
        (function(file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                dokumen.push({ id: Date.now(), nama: file.name, tipe: file.type, data: e.target.result, keterangan: '', tanggal: new Date().toLocaleDateString('id-ID') });
                done++;
                if (done === total) { localStorage.setItem('2r_dokumen_sa', JSON.stringify(dokumen)); loadDokumenSA(); tampilkanToast(total + ' dokumen diunggah!', 'success'); }
            };
            reader.readAsDataURL(file);
        })(files[i]);
    }
}

function loadDokumenSA() {
    var container = document.getElementById('daftarDokumen');
    if (!container) return;
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    if (dokumen.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fas fa-cloud-upload-alt"></i><h3>Belum ada dokumen</h3></div>'; return; }
    var html = '';
    for (var i = 0; i < dokumen.length; i++) {
        var d = dokumen[i];
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee;">';
        html += '<div style="display:flex;align-items:center;gap:15px;">';
        html += (d.tipe && d.tipe.startsWith('image/')) ? '<img src="' + d.data + '" style="width:50px;height:50px;border-radius:6px;object-fit:cover;cursor:pointer;" onclick="previewGambar(\'' + d.data + '\',\'' + d.nama + '\')">' : '<div style="width:50px;height:50px;background:#fff0e5;color:#FF6B00;display:flex;align-items:center;justify-content:center;border-radius:6px;"><i class="fas fa-file-alt"></i></div>';
        html += '<div><h4 style="font-size:14px;">' + d.nama + '</h4><p style="font-size:12px;color:#888;">' + (d.keterangan || 'Tidak ada keterangan') + ' | ' + d.tanggal + '</p></div></div>';
        html += '<div style="display:flex;gap:6px;"><button class="btn btn-primary btn-xs" onclick="editDokumenSA(' + i + ')"><i class="fas fa-edit"></i></button><button class="btn btn-danger btn-xs" onclick="hapusDokumenSA(' + i + ')"><i class="fas fa-trash"></i></button></div></div>';
    }
    container.innerHTML = html;
}

function editDokumenSA(index) {
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    var nama = prompt('Nama file:', dokumen[index].nama);
    if (nama !== null) { var ket = prompt('Keterangan:', dokumen[index].keterangan || ''); if (ket !== null) { dokumen[index].nama = nama; dokumen[index].keterangan = ket; localStorage.setItem('2r_dokumen_sa', JSON.stringify(dokumen)); loadDokumenSA(); tampilkanToast('Dokumen diperbarui!', 'success'); } }
}

function hapusDokumenSA(index) {
    if (!confirm('Hapus dokumen ini?')) return;
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    dokumen.splice(index, 1);
    localStorage.setItem('2r_dokumen_sa', JSON.stringify(dokumen));
    loadDokumenSA();
    tampilkanToast('Dokumen dihapus!', 'success');
}

function previewGambar(src, title) {
    document.getElementById('modalPreviewImage').src = src;
    document.getElementById('modalPreviewTitle').textContent = title || 'Preview';
    bukaModal('modalPreviewGambar');
}

function simpanKeteranganSA() {
    localStorage.setItem('2r_keterangan_sa', document.getElementById('textKeterangan').value);
    tampilkanToast('Keterangan disimpan!', 'success');
}

function loadKeteranganSA() {
    var k = localStorage.getItem('2r_keterangan_sa');
    var el = document.getElementById('textKeterangan');
    if (k && el) el.value = k;
}
</script>

function previewKTP(file) {
    if (!file) return;

    reader.onload = function(e) {
        document.getElementById('ktpPreview').innerHTML = '<img src="' + e.target.result + '" class="preview-img">';
        localStorage.setItem('2r_ktp_temp', e.target.result);
    };
    reader.readAsDataURL(file);
}

function simpanKTP() {
    var ktp = localStorage.getItem('2r_ktp_temp');

    var akun = getDataAkun();
    user.ktp = ktp;
    for (var i = 0; i < akun.length; i++) { if (akun[i].id === user.id) { akun[i].ktp = ktp; break; } }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    localStorage.removeItem('2r_ktp_temp');
    tampilkanToast('KTP disimpan!', 'success');
}

<script>
function renderDaftarAkun() {
    var html = '';
    html += '<div class="page-header"><h2>Daftar Akun Baru</h2><p>Form pendaftaran akun oleh SuperAdmin.</p></div>';
    html += '<div class="card"><div class="card-header">Form Pendaftaran</div>';
    html += '<div class="form-group"><label>Role</label><select id="daftarRole" class="form-input" onchange="updatePreviewId()"><option value="customer">Customer</option><option value="toko">Toko (Verifikasi)</option><option value="ojek">Ojek (Verifikasi)</option><option value="pedagang">Pedagang Pasar</option><option value="staf_admin">Staf Admin</option><option value="staf_owner_ojek">Staf Owner Ojek</option><option value="staf_owner_toko">Staf Owner Toko</option><option value="customer_service">Customer Service</option><option value="sponsor">Sponsor</option></select></div>';
    html += '<div class="form-group"><label>ID Akun (Otomatis)</label><div style="background:#f0f0f0;border:2px solid #ddd;border-radius:8px;padding:12px;"><span id="daftarIdPreview" style="font-weight:600;">' + generateId('customer') + '</span></div></div>';
    html += '<div class="form-group"><label>Username</label><input type="text" id="daftarUsername" class="form-input" placeholder="Username" required></div>';
    html += '<div class="form-group"><label>Password</label><input type="password" id="daftarPassword" class="form-input" placeholder="Password" required></div>';
    html += '<div class="form-group"><label>Nama Lengkap</label><input type="text" id="daftarNama" class="form-input" placeholder="Nama Lengkap" required></div>';
    html += '<button class="btn btn-primary" style="width:100%;" onclick="prosesDaftarAkun()"><i class="fas fa-user-plus"></i> Buat Akun Baru</button></div>';
    document.getElementById('mainContent').innerHTML = html;
}

function updatePreviewId() {
    var role = document.getElementById('daftarRole').value;
    document.getElementById('daftarIdPreview').textContent = generateId(role);
}

function prosesDaftarAkun() {
    var role = document.getElementById('daftarRole').value;
    var username = document.getElementById('daftarUsername').value.trim();
    var password = document.getElementById('daftarPassword').value.trim();
    var nama = document.getElementById('daftarNama').value.trim();
    if (!role || !username || !password || !nama) { tampilkanToast('Data belum lengkap!', 'warning'); return; }
    if (username.length < 4) { tampilkanToast('Username minimal 4 karakter!', 'warning'); return; }
    if (password.length < 6) { tampilkanToast('Password minimal 6 karakter!', 'warning'); return; }
    var akun = getDataAkun();
    if (akun.find(function(a) { return a.username === username; })) { tampilkanToast('Username sudah digunakan!', 'error'); return; }
    var statusAkun = (role === 'toko' || role === 'ojek') ? 'NONAKTIF (Menunggu Verifikasi)' : 'AKTIF';
    var akunBaru = { id: generateId(role), role: role, username: username, password: encodePassword(password), nama: nama, email: '', hp: '', alamat: '', status: statusAkun, registeredAt: new Date().toISOString() };
    akun.push(akunBaru);
    simpanDataAkun(akun);
    document.getElementById('daftarUsername').value = '';
    document.getElementById('daftarPassword').value = '';
    document.getElementById('daftarNama').value = '';
    updatePreviewId();
    tampilkanToast('Akun ' + role + ' berhasil dibuat! ID: ' + akunBaru.id, 'success');
}
</script>

<script>
function renderPersetujuanAkun() {
    var akun = getDataAkun().filter(function(a) { return a.role !== 'superadmin' && a.role !== 'customer'; });
    var html = '<div class="page-header"><h2>Persetujuan Akun</h2><p>Daftar akun yang membutuhkan persetujuan.</p></div>';
    html += '<div class="card"><div class="card-header"><span>Daftar Permintaan</span><span>Total: ' + akun.length + ' akun</span></div>';
    if (akun.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-check-circle" style="color:#4CAF50;"></i><h3>Tidak ada akun menunggu</h3></div>';
    } else {
        html += '<div class="table-container"><table class="table"><thead><tr><th>ID</th><th>Role</th><th>Username</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < akun.length; i++) {
            var a = akun[i];
            var badge = a.status === 'AKTIF' ? 'badge-success' : 'badge-warning';
            var statusText = a.status === 'AKTIF' ? 'AKTIF' : 'Menunggu';
            html += '<tr><td>' + a.id + '</td><td>' + a.role + '</td><td>' + a.username + '</td><td>' + a.nama + '</td><td><span class="badge ' + badge + '">' + statusText + '</span></td><td>';
            if (a.status !== 'AKTIF') {
                html += '<button class="btn btn-success btn-xs" onclick="setujuiAkun(\'' + a.id + '\')" style="margin-right:5px;">Setujui</button><button class="btn btn-danger btn-xs" onclick="bukaTolakAkun(\'' + a.id + '\')">Tolak</button>';
            } else { html += '<span style="color:#888;">Sudah Aktif</span>'; }
            html += '</td></tr>';
        }
        html += '</tbody></table></div>';
    }
    html += '</div>';
    document.getElementById('mainContent').innerHTML = html;
}

function setujuiAkun(id) {
    if (!confirm('Setujui akun ini?')) return;
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) { if (akun[i].id === id) { akun[i].status = 'AKTIF'; break; } }
    simpanDataAkun(akun);
    renderPersetujuanAkun();
    tampilkanToast('Akun diaktifkan!', 'success');
}

function bukaTolakAkun(id) { document.getElementById('tolakIdAkun').value = id; bukaModal('modalTolakAkun'); }

function eksekusiTolakAkun() {
    var id = document.getElementById('tolakIdAkun').value;
    var akun = getDataAkun().filter(function(a) { return a.id !== id; });
    simpanDataAkun(akun);
    tutupModal('modalTolakAkun');
    renderPersetujuanAkun();
    tampilkanToast('Akun ditolak!', 'success');
}

function renderKelolaAkun() {
    var akun = getDataAkun().filter(function(a) { return a.role !== 'superadmin'; });
    var html = '<div class="page-header"><h2>Kelola Semua Akun</h2><p>Mengelola seluruh akun terdaftar.</p></div><div class="card">';
    if (akun.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-users-slash"></i><h3>Belum ada akun</h3></div>';
    } else {
        html += '<div class="table-container"><table class="table"><thead><tr><th>No</th><th>ID</th><th>Role</th><th>Username</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < akun.length; i++) {
            var a = akun[i];
            var badge = a.status === 'AKTIF' ? 'badge-success' : (a.status === 'NONAKTIF (Menunggu Verifikasi)' ? 'badge-warning' : 'badge-danger');
            var statusText = a.status === 'AKTIF' ? 'AKTIF' : (a.status === 'NONAKTIF (Menunggu Verifikasi)' ? 'Menunggu' : 'Nonaktif');
            html += '<tr><td>' + (i+1) + '</td><td>' + a.id + '</td><td>' + a.role + '</td><td>' + a.username + '</td><td>' + a.nama + '</td><td><span class="badge ' + badge + '">' + statusText + '</span></td><td><div style="display:flex;gap:5px;">';
            if (a.status !== 'AKTIF') { html += '<button class="btn btn-success btn-xs" onclick="aktifkanAkun(\'' + a.id + '\')">Aktifkan</button>'; }
            else { html += '<button class="btn btn-warning btn-xs" onclick="nonaktifkanAkun(\'' + a.id + '\')">Nonaktifkan</button>'; }
            html += '<button class="btn btn-danger btn-xs" onclick="hapusAkun(\'' + a.id + '\')">Hapus</button></div></td></tr>';
        }
        html += '</tbody></table></div>';
    }
    html += '</div>';
    document.getElementById('mainContent').innerHTML = html;
}

function aktifkanAkun(id) {
    if (!confirm('Aktifkan akun ini?')) return;
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) { if (akun[i].id === id) { akun[i].status = 'AKTIF'; break; } }
    simpanDataAkun(akun); renderKelolaAkun(); tampilkanToast('Akun diaktifkan!', 'success');
}

function nonaktifkanAkun(id) {
    if (!confirm('Nonaktifkan akun ini?')) return;
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) { if (akun[i].id === id) { akun[i].status = 'NONAKTIF (Dinonaktifkan)'; break; } }
    simpanDataAkun(akun); renderKelolaAkun(); tampilkanToast('Akun dinonaktifkan!', 'success');
}

function hapusAkun(id) {
    if (!confirm('HAPUS permanen akun ini?')) return;
    if (!confirm('KONFIRMASI: Yakin hapus?')) return;
    var akun = getDataAkun().filter(function(a) { return a.id !== id; });
    simpanDataAkun(akun); renderKelolaAkun(); tampilkanToast('Akun dihapus!', 'success');
}
</script>
