    @media (min-width: 768px) and (max-width: 1024px) {

<!-- ===== BLOK 6 (1) - 01 UTILITY & DATA CORE ===== -->
<script>
// ===== FUNGSI DASAR =====
function getDataAkun() {
    var data = localStorage.getItem('2r_akun');
    if (data) {
        return JSON.parse(data);
    } else {
        return [];
    }
}

function simpanDataAkun(akun) {
    localStorage.setItem('2r_akun', JSON.stringify(akun));
}

function encodePassword(password) {
    return btoa(password);
}

function decodePassword(encoded) {
    return atob(encoded);
}

function inisialisasiSuperAdmin() {
    var akun = getDataAkun();
    var adaSuperAdmin = false;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].role === 'superadmin') {
            adaSuperAdmin = true;
            break;
        }
    }
    if (!adaSuperAdmin) {
        var superAdmin = {
            id: 'SA-001',
            role: 'superadmin',
            username: 'admin',
            password: encodePassword('admin123'),
            nama: 'SuperAdmin',
            email: 'admin@2r.com',
            hp: '081234567890',
            alamat: 'Kantor Pusat',
            bank: '',
            rekening: '',
            pemilikRek: '',
            status: 'AKTIF',
            registeredAt: new Date().toISOString()
        };
        akun.push(superAdmin);
        simpanDataAkun(akun);
    }
}

function generateId(role) {
    var akun = getDataAkun();
    var daftarRole = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].role === role) {
            daftarRole.push(akun[i]);
        }
    }
    var urut = 1;
    for (var j = 0; j < daftarRole.length; j++) {
        var parts = daftarRole[j].id.split('-');
        if (parts.length === 2) {
            var nomor = parseInt(parts[1]);
            if (nomor >= urut) {
                urut = nomor + 1;
            }
        }
    }
    var prefix = '';
    if (role === 'customer') {
        prefix = 'CUST';
    } else if (role === 'toko') {
        prefix = 'TOKO';
    } else if (role === 'ojek') {
        prefix = 'OJEK';
    } else if (role === 'pedagang') {
        prefix = 'PEDAGANG';
    } else if (role === 'codseller') {
        prefix = 'COD';
    } else if (role === 'superadmin') {
        prefix = 'SA';
    } else if (role === 'staf_admin') {
        prefix = 'STA';
    } else if (role === 'staf_owner_ojek') {
        prefix = 'SOO';
    } else if (role === 'staf_owner_toko') {
        prefix = 'SOT';
    } else if (role === 'customer_service') {
        prefix = 'CS';
    } else if (role === 'sponsor') {
        prefix = 'SPN';
    } else {
        prefix = 'USR';
    }
    return prefix + '-' + String(urut).padStart(3, '0');
}

function tampilkanToast(pesan, tipe) {
    if (!tipe) {
        tipe = 'success';
    }
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + tipe;
    var icon = '';
    if (tipe === 'success') {
        icon = 'fa-check-circle';
    } else if (tipe === 'error') {
        icon = 'fa-times-circle';
    } else if (tipe === 'warning') {
        icon = 'fa-exclamation-triangle';
    } else {
        icon = 'fa-info-circle';
    }
    toast.innerHTML = '<i class="fas ' + icon + '"></i> ' + pesan;
    container.appendChild(toast);
    setTimeout(function() {
        toast.style.animation = 'slideInRight 0.3s ease reverse';
        setTimeout(function() {
            toast.remove();
        }, 300);
    }, 3500);
}

function bukaModal(id) {
    var modal = document.getElementById(id);
    if (modal) {
        modal.classList.add('active');
    }
}

function tutupModal(id) {
    var modal = document.getElementById(id);
    if (modal) {
        modal.classList.remove('active');
    }
}
</script>

    } else {
        document.getElementById('registerForm').classList.add('hidden-form');
        document.getElementById('loginForm').classList.remove('hidden-form');
    }
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('loginUsername').value.trim();
    var password = document.getElementById('loginPassword').value.trim();
    var akun = getDataAkun();
    var user = null;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].username === username && decodePassword(akun[i].password) === password) {
            user = akun[i];
            break;
        }
    }
    if (user) {
        if (user.status !== 'AKTIF' && user.role !== 'superadmin') {
            document.getElementById('authError').style.display = 'block';
            document.getElementById('authErrorText').textContent = 'Akun belum aktif. Menunggu verifikasi admin.';
            return;
        }
        localStorage.setItem('2r_user', JSON.stringify(user));
        localStorage.setItem('2r_user_role', user.role);
        tampilkanDashboard(user);
    } else {
        document.getElementById('authError').style.display = 'block';
        document.getElementById('authErrorText').textContent = 'Username atau password salah!';
    }
});

document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var role = document.getElementById('regRole').value;
    var username = document.getElementById('regUsername').value.trim();
    var password = document.getElementById('regPassword').value.trim();
    var nama = document.getElementById('regNama').value.trim();
    if (!role || !username || !password || !nama) {
        alert('Data belum lengkap!');
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].username === username) {
            alert('Username sudah digunakan!');
            return;
        }
    }
    var statusAkun = '';
    if (role === 'toko' || role === 'ojek') {
        statusAkun = 'NONAKTIF (Menunggu Verifikasi)';
    } else {
        statusAkun = 'AKTIF';
    }
    var akunBaru = {
        id: generateId(role),
        role: role,
        username: username,
        password: encodePassword(password),
        nama: nama,
        email: '',
        hp: '',
        alamat: '',
        bank: '',
        rekening: '',
        pemilikRek: '',
        status: statusAkun,
        registeredAt: new Date().toISOString()
    };
    akun.push(akunBaru);
    simpanDataAkun(akun);
    alert('Akun berhasil dibuat! ID: ' + akunBaru.id + '\nStatus: ' + statusAkun);
    toggleForm('login');
});
	// ===== TAMBAHAN: Update ID otomatis saat role berubah =====
document.getElementById('regRole').addEventListener('change', function() {
    var role = this.value;
    var idPreview = document.getElementById('regIdPreview');
    if (idPreview) {
        idPreview.value = generateId(role);
    }
});
</script>

<script>

<script>
function renderDashboard() {
    var role = localStorage.getItem('2r_user_role');

    var contentArea = document.getElementById('mainContent');
    var html = '';

    // ===== SUPERADMIN =====
    if (role === 'superadmin') {
        var akun = getDataAkun();
        var total = akun.length;
        var aktif = 0;
        var menunggu = 0;
        var nonaktif = 0;
        for (var i = 0; i < akun.length; i++) {
            if (akun[i].status === 'AKTIF') {
                aktif++;

                menunggu++;
            } else {
                nonaktif++;

        var terbaru = akun.slice();
        terbaru.sort(function(a, b) {
            return new Date(b.registeredAt) - new Date(a.registeredAt);

// ===== RENDER HALAMAN PENGAJUAN HAPUS AKUN =====
function renderPengajuanHapusAkun() {
    var role = localStorage.getItem('2r_user_role');
    if (role !== 'superadmin' && role !== 'staf_admin') {
        tampilkanToast('Anda tidak memiliki akses!', 'error');
        return;
    }
    
    var contentArea = document.getElementById('mainContent');
    var pengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
    var html = '';
    html += '<div class="page-header"><h2>Pengajuan Hapus Akun</h2><p>Daftar pengajuan penghapusan akun dari Customer.</p></div>';
    html += '<div class="card"><div class="card-header">Daftar Pengajuan <span style="font-weight:normal;font-size:13px;color:#888;">(Total: ' + pengajuan.length + ')</span></div>';
    
    if (pengajuan.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-check-circle" style="color:#4CAF50;"></i><h3>Belum ada pengajuan</h3><p>Tidak ada permintaan penghapusan akun.</p></div>';
    } else {
        html += '<div class="table-container"><table class="table"><thead><tr><th>No</th><th>ID Akun</th><th>Username</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < pengajuan.length; i++) {
            var p = pengajuan[i];
            var badge = p.status === 'MENUNGGU' ? 'badge-warning' : 'badge-success';
            html += '<tr><td>' + (i+1) + '</td><td>' + p.userId + '</td><td>' + p.username + '</td><td>' + p.nama + '</td><td><span class="badge ' + badge + '">' + p.status + '</span></td><td>';
            if (p.status === 'MENUNGGU') {
                html += '<button class="btn btn-success btn-xs" onclick="setujuiPengajuanHapus(' + i + ')">Setujui</button>';
                html += '<button class="btn btn-danger btn-xs" onclick="tolakPengajuanHapus(' + i + ')">Tolak</button>';
            } else {
                html += '<span style="color:#888;">Selesai</span>';
            }
            html += '</td></tr>';
        }
        html += '</tbody></table></div>';
    }
    html += '</div>';
    contentArea.innerHTML = html;
}

// ===== FUNGSI SETUJUI PENGAJUAN HAPUS =====
function setujuiPengajuanHapus(index) {
    var pengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
    if (index < 0 || index >= pengajuan.length) {
        tampilkanToast('Data tidak ditemukan!', 'error');
        return;
    }
    if (!confirm('Setujui penghapusan akun ini?')) return;
    
    var p = pengajuan[index];
    // Hapus akun dari data akun
    var akun = getDataAkun();
    var akunBaru = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id !== p.userId) {
            akunBaru.push(akun[i]);
        }
    }
    simpanDataAkun(akunBaru);
    
    // Update status pengajuan
    pengajuan[index].status = 'DISETUJUI';
    localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(pengajuan));
    
    renderPengajuanHapusAkun();
    tampilkanToast('Pengajuan disetujui! Akun dihapus.', 'success');
}

// ===== FUNGSI TOLAK PENGAJUAN HAPUS =====
function tolakPengajuanHapus(index) {
    var pengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
    if (index < 0 || index >= pengajuan.length) {
        tampilkanToast('Data tidak ditemukan!', 'error');
        return;
    }
    if (!confirm('Tolak pengajuan ini?')) return;
    pengajuan[index].status = 'DITOLAK';
    localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(pengajuan));
    renderPengajuanHapusAkun();
    tampilkanToast('Pengajuan ditolak.', 'success');
}
</script>

    if (user.domProvinsi) gabungDom += user.domProvinsi + ', ';
    if (user.domKodepos) gabungDom += user.domKodepos;
    user.alamatDomisili = gabungDom;
    
    // Untuk kompatibilitas
    user.alamat = user.alamatDomisili || user.alamatKTP;
    
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) {
            akun[i].nama = user.nama;
            akun[i].email = user.email;
            akun[i].hp = user.hp;
            
            // Simpan alamat KTP
            akun[i].ktpDusun = user.ktpDusun;
            akun[i].ktpRT = user.ktpRT;
            akun[i].ktpRW = user.ktpRW;
            akun[i].ktpJalan = user.ktpJalan;
            akun[i].ktpDesa = user.ktpDesa;
            akun[i].ktpKecamatan = user.ktpKecamatan;
            akun[i].ktpKabupaten = user.ktpKabupaten;
            akun[i].ktpProvinsi = user.ktpProvinsi;
            akun[i].ktpKodepos = user.ktpKodepos;
            akun[i].alamatKTP = user.alamatKTP;
            
            // Simpan alamat domisili
            akun[i].domDusun = user.domDusun;
            akun[i].domRT = user.domRT;
            akun[i].domRW = user.domRW;
            akun[i].domJalan = user.domJalan;
            akun[i].domDesa = user.domDesa;
            akun[i].domKecamatan = user.domKecamatan;
            akun[i].domKabupaten = user.domKabupaten;
            akun[i].domProvinsi = user.domProvinsi;
            akun[i].domKodepos = user.domKodepos;
            akun[i].alamatDomisili = user.alamatDomisili;
            
            akun[i].alamat = user.alamat;
            break;
        }
    }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    document.getElementById('userNama').textContent = user.nama;

    var ktp = localStorage.getItem('2r_ktp_temp_customer');
    if (!ktp) { tampilkanToast('Upload KTP dulu!', 'warning'); return; }
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.ktp = ktp;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) { akun[i].ktp = ktp; break; }

    simpanDataAkun(akun);

    tampilkanToast('KTP disimpan!', 'success');
}

	function ajukanHapusAkunCustomer() {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    if (!user.id) {
        tampilkanToast('Data akun tidak ditemukan!', 'error');
        return;
    }

    if (!confirm('Apakah Anda yakin ingin mengajukan penghapusan akun? Tindakan ini tidak dapat dibatalkan.')) {
        return;
    }

    var pengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');

    for (var i = 0; i < pengajuan.length; i++) {
        if (pengajuan[i].userId === user.id && pengajuan[i].status === 'MENUNGGU') {
            tampilkanToast('Anda sudah memiliki pengajuan yang sedang diproses!', 'warning');
            return;
        }
    }

    var pengajuanBaru = {
        id: Date.now(),
        userId: user.id,
        username: user.username,
        nama: user.nama,
        email: user.email,
        hp: user.hp,
        alamat: user.alamat,
        role: user.role,
        status: 'MENUNGGU',
        diajukanPada: new Date().toISOString()
    };

    pengajuan.push(pengajuanBaru);
    localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(pengajuan));

    tampilkanToast('Pengajuan hapus akun berhasil dikirim ke admin!', 'success');
    renderEditAkun();
}

// ===== FUNGSI TERUSKAN PENGAJUAN DARI STAF ADMIN KE SUPERADMIN =====
function teruskanPengajuanHapus(index) {
    var pengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
    if (index < 0 || index >= pengajuan.length) {
        tampilkanToast('Data tidak ditemukan!', 'error');
        return;
    }
    if (!confirm('Teruskan pengajuan ini ke SuperAdmin?')) {
        return;
    }
    
    // Ubah status pengajuan customer menjadi DITERUSKAN
    pengajuan[index].status = 'DITERUSKAN';
    localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(pengajuan));
    
    // Ambil data pengajuan yang diteruskan
    var p = pengajuan[index];
    
    // Simpan ke dalam database pengajuan staf (untuk SuperAdmin)
    var pengajuanStaf = JSON.parse(localStorage.getItem('2r_pengajuan_hapus_staf') || '[]');
    pengajuanStaf.push({
        id: Date.now(),
        targetId: p.userId,
        targetUsername: p.username,
        targetNama: p.nama,
        targetRole: p.role,
        diajukanOleh: 'Staf Admin',
        status: 'MENUNGGU',
        diajukanPada: new Date().toISOString()
    });
    localStorage.setItem('2r_pengajuan_hapus_staf', JSON.stringify(pengajuanStaf));
    
    renderDashboard();
    tampilkanToast('Pengajuan diteruskan ke SuperAdmin!', 'success');
}

// ===== FUNGSI TOLAK PENGAJUAN OLEH STAF ADMIN =====
function tolakPengajuanHapusStaf(index) {
    var pengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
    if (index < 0 || index >= pengajuan.length) {
        tampilkanToast('Data tidak ditemukan!', 'error');
        return;
    }
    if (!confirm('Tolak pengajuan ini?')) {
        return;
    }
    pengajuan[index].status = 'DITOLAK';
    localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(pengajuan));
    renderDashboard();
    tampilkanToast('Pengajuan ditolak.', 'success');
}

// ===== FUNGSI SETUJUI PENGAJUAN OLEH SUPERADMIN =====
function setujuiPengajuanStaf(index) {
    var pengajuanStaf = JSON.parse(localStorage.getItem('2r_pengajuan_hapus_staf') || '[]');
    if (index < 0 || index >= pengajuanStaf.length) {
        tampilkanToast('Data tidak ditemukan!', 'error');
        return;
    }
    if (!confirm('Setujui dan hapus akun ini secara permanen?')) {
        return;
    }
    
    var p = pengajuanStaf[index];
    
    // 1. Hapus akun dari database utama
    var akun = getDataAkun();
    var akunBaru = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id !== p.targetId) {
            akunBaru.push(akun[i]);
        }
    }
    simpanDataAkun(akunBaru);
    
    // 2. Update status pengajuan staf menjadi DISETUJUI (supaya tidak muncul lagi di tabel)
    pengajuanStaf[index].status = 'DISETUJUI';
    localStorage.setItem('2r_pengajuan_hapus_staf', JSON.stringify(pengajuanStaf));
    
    // 3. Update status pengajuan customer (jika ada) menjadi DISETUJUI
    var pengajuanCustomer = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
    for (var i = 0; i < pengajuanCustomer.length; i++) {
        if (pengajuanCustomer[i].userId === p.targetId && pengajuanCustomer[i].status === 'DITERUSKAN') {
            pengajuanCustomer[i].status = 'DISETUJUI';
            break;
        }
    }
    localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(pengajuanCustomer));
    
    // 4. Render ulang dashboard agar tabel langsung kosong
    renderDashboard();
    
    tampilkanToast('Akun berhasil dihapus permanen!', 'success');
}

// ===== FUNGSI TOLAK PENGAJUAN OLEH SUPERADMIN =====
function tolakPengajuanStaf(index) {
    var pengajuanStaf = JSON.parse(localStorage.getItem('2r_pengajuan_hapus_staf') || '[]');
    if (index < 0 || index >= pengajuanStaf.length) {
        tampilkanToast('Data tidak ditemukan!', 'error');
        return;
    }
    if (!confirm('Tolak pengajuan ini?')) {
        return;
    }
    
    // Update status pengajuan staf menjadi DITOLAK
    pengajuanStaf[index].status = 'DITOLAK';
    localStorage.setItem('2r_pengajuan_hapus_staf', JSON.stringify(pengajuanStaf));
    
    // Update status pengajuan customer (jika ada) menjadi DITOLAK
    var pengajuanCustomer = JSON.parse(localStorage.getItem('2r_pengajuan_hapus') || '[]');
    for (var i = 0; i < pengajuanCustomer.length; i++) {
        if (pengajuanCustomer[i].userId === pengajuanStaf[index].targetId && pengajuanCustomer[i].status === 'DITERUSKAN') {
            pengajuanCustomer[i].status = 'DITOLAK';
            break;
        }
    }
    localStorage.setItem('2r_pengajuan_hapus', JSON.stringify(pengajuanCustomer));
    
    renderDashboard();
    tampilkanToast('Pengajuan ditolak.', 'success');
}

        gambar: gambar
    };

    iklan.push(iklanBaru);
    localStorage.setItem('2r_iklan', JSON.stringify(iklan));
    localStorage.removeItem('2r_iklan_gambar_temp');

    document.getElementById('iklanJudul').value = '';
    document.getElementById('iklanDeskripsi').value = '';
    document.getElementById('iklanNamaGambar').textContent = 'Belum ada gambar';

    renderMenuIklan();
    tampilkanToast('Iklan berhasil ditambahkan!', 'success');
}

// ===== FUNGSI EDIT IKLAN (SUPERADMIN SAJA) =====
function editIklan(index) {
    var iklan = JSON.parse(localStorage.getItem('2r_iklan') || '[]');
    var d = iklan[index];

    var judulBaru = prompt('Edit Judul Iklan:', d.judul);
    if (judulBaru === null) {
        return;
    }

    var deskripsiBaru = prompt('Edit Deskripsi Iklan:', d.deskripsi);
    if (deskripsiBaru === null) {
        return;
    }

    var warnaBaru = prompt('Edit Warna (hex, contoh #FF6B00):', d.warna || '#FF6B00');
    if (warnaBaru === null) {
        return;
    }

    var gantiGambar = confirm('Apakah Anda ingin mengganti gambar? (Klik OK untuk ganti, Batal untuk tetap menggunakan gambar lama)');
    var gambarBaru = d.gambar;

    if (gantiGambar) {
        var fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.jpg,.jpeg,.png';

        fileInput.onchange = function(e) {
            var file = e.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(ev) {
                    gambarBaru = ev.target.result;

                    iklan[index].judul = judulBaru;
                    iklan[index].deskripsi = deskripsiBaru;
                    iklan[index].warna = warnaBaru;
                    iklan[index].gambar = gambarBaru;

                    localStorage.setItem('2r_iklan', JSON.stringify(iklan));
                    renderMenuIklan();
                    tampilkanToast('Iklan berhasil diperbarui!', 'success');
                };
                reader.readAsDataURL(file);
            }
        };

        fileInput.click();
        return;
    }

    // Jika tidak ganti gambar
    iklan[index].judul = judulBaru;
    iklan[index].deskripsi = deskripsiBaru;
    iklan[index].warna = warnaBaru;

    localStorage.setItem('2r_iklan', JSON.stringify(iklan));
    renderMenuIklan();
    tampilkanToast('Iklan berhasil diperbarui!', 'success');
}

// ===== FUNGSI HAPUS IKLAN (SUPERADMIN SAJA) =====
function hapusIklan(index) {
    if (!confirm('Apakah Anda yakin ingin menghapus iklan ini?')) {
        return;
    }

    var iklan = JSON.parse(localStorage.getItem('2r_iklan') || '[]');
    iklan.splice(index, 1);
    localStorage.setItem('2r_iklan', JSON.stringify(iklan));

    renderMenuIklan();
    tampilkanToast('Iklan berhasil dihapus!', 'success');
}

// ===== FUNGSI PERBESAR GAMBAR IKLAN =====
function perbesarGambarIklan(src, judul) {

    var modal = document.getElementById('modalPreviewGambar');

function downloadGambarIklan(src, judul) {

<script>
// ===== FUNGSI SIMPAN DATA APLIKASI =====
function simpanDataAplikasi() {
    var data = {
        nama: document.getElementById('appNama').value,
        penerbit: document.getElementById('appPenerbit').value,
        pemilik: document.getElementById('appPemilik').value,
        pengelola: document.getElementById('appPengelola').value
    };
    localStorage.setItem('2r_data_aplikasi', JSON.stringify(data));
    tampilkanToast('Data aplikasi disimpan!', 'success');
}

// ===== FUNGSI LOAD DATA APLIKASI =====
function loadDataAplikasi() {
    var data = JSON.parse(localStorage.getItem('2r_data_aplikasi') || '{}');
    if (document.getElementById('appNama')) {
        document.getElementById('appNama').value = data.nama || '';
    }
    if (document.getElementById('appPenerbit')) {
        document.getElementById('appPenerbit').value = data.penerbit || '';
    }
    if (document.getElementById('appPemilik')) {
        document.getElementById('appPemilik').value = data.pemilik || '';
    }
    if (document.getElementById('appPengelola')) {
        document.getElementById('appPengelola').value = data.pengelola || '';
    }
}

// ===== FUNGSI UBAH PASSWORD SUPERADMIN =====
function ubahPasswordSA() {
    var username = document.getElementById('saUsername').value.trim();
    var password = document.getElementById('saPassword').value.trim();
    var konfirmasi = document.getElementById('saPasswordKonfirmasi').value.trim();
    if (!username) {
        tampilkanToast('Username tidak boleh kosong!', 'warning');
        return;
    }
    if (password && password !== konfirmasi) {
        tampilkanToast('Password tidak cocok!', 'error');
        return;
    }
    if (password && password.length < 6) {
        tampilkanToast('Password minimal 6 karakter!', 'warning');
        return;
    }
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.username = username;
    if (password) {
        user.password = encodePassword(password);
    }
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) {
            akun[i].username = username;
            if (password) {
                akun[i].password = encodePassword(password);
            }
            break;
        }
    }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    document.getElementById('saPassword').value = '';
    document.getElementById('saPasswordKonfirmasi').value = '';
    tampilkanToast('Keamanan akun diperbarui!', 'success');
}

// ===== FUNGSI SIMPAN DATA PRIBADI & REKENING SUPERADMIN =====
function simpanDataPribadiSA() {
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.nama = document.getElementById('saNama').value;
    user.alamat = document.getElementById('saAlamat').value;
    user.email = document.getElementById('saEmail').value;
    user.hp = document.getElementById('saHp').value;
    user.bank = document.getElementById('saBank').value;
    user.rekening = document.getElementById('saRekening').value;
    user.pemilikRek = document.getElementById('saPemilikRek').value;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) {
            akun[i].nama = user.nama;
            akun[i].alamat = user.alamat;
            akun[i].email = user.email;
            akun[i].hp = user.hp;
            akun[i].bank = user.bank;
            akun[i].rekening = user.rekening;
            akun[i].pemilikRek = user.pemilikRek;
            break;
        }
    }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    document.getElementById('userNama').textContent = user.nama;
    tampilkanToast('Data pribadi dan rekening disimpan!', 'success');
}

// ===== FUNGSI UPLOAD DOKUMEN PERUSAHAAN =====
function uploadDokumenSA(files) {
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    var total = files.length;
    var done = 0;
    for (var i = 0; i < files.length; i++) {
        (function(file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                dokumen.push({
                    id: Date.now(),
                    nama: file.name,
                    tipe: file.type,
                    data: e.target.result,
                    keterangan: '',
                    tanggal: new Date().toLocaleDateString('id-ID')
                });
                done++;
                if (done === total) {
                    localStorage.setItem('2r_dokumen_sa', JSON.stringify(dokumen));
                    loadDokumenSA();
                    tampilkanToast(total + ' dokumen diunggah!', 'success');
                }
            };
            reader.readAsDataURL(file);
        })(files[i]);
    }
}

// ===== FUNGSI LOAD DOKUMEN PERUSAHAAN (DENGAN DOWNLOAD & BAGIKAN) =====
function loadDokumenSA() {
    var container = document.getElementById('daftarDokumen');
    if (!container) {
        return;
    }
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    if (dokumen.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-cloud-upload-alt"></i><h3>Belum ada dokumen</h3></div>';
        return;
    }
    var html = '';
    for (var i = 0; i < dokumen.length; i++) {
        var d = dokumen[i];
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee;">';
        html += '<div style="display:flex;align-items:center;gap:15px;">';
        if (d.tipe && d.tipe.startsWith('image/')) {
            html += '<img src="' + d.data + '" style="width:50px;height:50px;border-radius:6px;object-fit:cover;cursor:pointer;" onclick="previewGambar(\'' + d.data + '\',\'' + d.nama + '\')">';
        } else {
            html += '<div style="width:50px;height:50px;background:#fff0e5;color:#FF6B00;display:flex;align-items:center;justify-content:center;border-radius:6px;"><i class="fas fa-file-alt"></i></div>';
        }
        html += '<div><h4 style="font-size:14px;">' + d.nama + '</h4><p style="font-size:12px;color:#888;">' + (d.keterangan || 'Tidak ada keterangan') + ' | ' + d.tanggal + '</p></div></div>';
        html += '<div style="display:flex;gap:6px;">';
        // ===== TOMBOL DOWNLOAD =====
        html += '<button class="btn btn-success btn-xs" onclick="downloadDokumenSA(' + i + ')"><i class="fas fa-download"></i></button>';
        // ===== TOMBOL BAGIKAN (COPY LINK) =====
        html += '<button class="btn btn-info btn-xs" style="background:#17a2b8;color:white;" onclick="bagikanDokumenSA(' + i + ')"><i class="fas fa-share-alt"></i></button>';
        html += '<button class="btn btn-primary btn-xs" onclick="editDokumenSA(' + i + ')"><i class="fas fa-edit"></i></button>';
        html += '<button class="btn btn-danger btn-xs" onclick="hapusDokumenSA(' + i + ')"><i class="fas fa-trash"></i></button>';
        html += '</div></div>';
    }
    container.innerHTML = html;
}

// ===== FUNGSI DOWNLOAD DOKUMEN =====
function downloadDokumenSA(index) {
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    var d = dokumen[index];
    if (!d || !d.data) {
        tampilkanToast('Dokumen tidak ditemukan!', 'error');
        return;
    }
    var link = document.createElement('a');
    link.href = d.data;
    link.download = d.nama;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    tampilkanToast('Dokumen sedang didownload!', 'success');
}

// ===== FUNGSI BAGIKAN DOKUMEN (COPY LINK) =====
function bagikanDokumenSA(index) {
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    var d = dokumen[index];
    if (!d || !d.data) {
        tampilkanToast('Dokumen tidak ditemukan!', 'error');
        return;
    }
    // Salin data base64 ke clipboard sebagai "link"
    var link = d.data;
    navigator.clipboard.writeText(link).then(function() {
        tampilkanToast('Link dokumen disalin ke clipboard!', 'success');
    }).catch(function() {
        // Fallback jika clipboard tidak didukung
        var textarea = document.createElement('textarea');
        textarea.value = link;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        tampilkanToast('Link dokumen disalin!', 'success');
    });
}

// ===== FUNGSI EDIT DOKUMEN PERUSAHAAN =====
function editDokumenSA(index) {
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    var nama = prompt('Nama file:', dokumen[index].nama);

// ===== FUNGSI HAPUS DOKUMEN PERUSAHAAN =====
function hapusDokumenSA(index) {
    if (!confirm('Hapus dokumen ini?')) {
        return;
    }
    var dokumen = JSON.parse(localStorage.getItem('2r_dokumen_sa') || '[]');
    dokumen.splice(index, 1);

function loadKeteranganSA() {

    html += '<div><label class="form-label">Nomor HP</label><input type="tel" id="profilHp" class="form-input" value="' + (user.hp || '') + '"></div>';
    html += '<div><label class="form-label">Alamat</label><input type="text" id="profilAlamat" class="form-input" value="' + (user.alamat || '') + '"></div></div>';
    html += '<div class="grid-2" style="margin-top:10px;"><div><label class="form-label">Nama Bank</label><input type="text" id="profilBank" class="form-input" value="' + (user.bank || '') + '"></div>';
    html += '<div><label class="form-label">Nomor Rekening</label><input type="text" id="profilRekening" class="form-input" value="' + (user.rekening || '') + '"></div>';
    html += '<div><label class="form-label">Nama Pemilik Rekening</label><input type="text" id="profilPemilikRek" class="form-input" value="' + (user.pemilikRek || '') + '"></div></div></div>';
    
    html += '<div class="card"><div class="card-header"><span><i class="fas fa-id-card" style="color:#FF6B00;"></i> Dokumen KTP</span></div>';
    html += '<div class="upload-area" id="uploadKtpContainer"><div id="ktpPreview">';
    if (user.ktp) {
        html += '<img src="' + user.ktp + '" class="preview-img">';
    } else {
        html += '<i class="fas fa-cloud-upload-alt"></i><p>Klik untuk upload KTP</p>';
    }
    html += '</div><input type="file" id="inputKtp" accept=".jpg,.jpeg,.png" style="display:none"></div>';
    html += '<button class="btn btn-primary mt-10" onclick="simpanKTP()"><i class="fas fa-save"></i> Simpan KTP</button></div>';

    contentArea.innerHTML = html;

    setTimeout(function() {
        var container = document.getElementById('uploadKtpContainer');
        var input = document.getElementById('inputKtp');
        if (container && input) {
            container.onclick = function() { input.click(); };
            input.onchange = function(e) { previewKTP(e.target.files[0]); };
        }
    }, 300);
}

// ===== FUNGSI SIMPAN DATA PRIBADI UMUM =====
function simpanDataPribadiUmum() {
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.nama = document.getElementById('profilNama').value;
    user.email = document.getElementById('profilEmail').value;
    user.hp = document.getElementById('profilHp').value;
    user.alamat = document.getElementById('profilAlamat').value;
    user.bank = document.getElementById('profilBank').value;
    user.rekening = document.getElementById('profilRekening').value;
    user.pemilikRek = document.getElementById('profilPemilikRek').value;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) {
            akun[i].nama = user.nama;
            akun[i].email = user.email;
            akun[i].hp = user.hp;
            akun[i].alamat = user.alamat;
            akun[i].bank = user.bank;
            akun[i].rekening = user.rekening;
            akun[i].pemilikRek = user.pemilikRek;
            break;
        }
    }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    document.getElementById('userNama').textContent = user.nama;
    tampilkanToast('Data pribadi dan rekening disimpan!', 'success');
}

// ===== FUNGSI PREVIEW KTP =====
function previewKTP(file) {
    if (!file) {
        return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('ktpPreview').innerHTML = '<img src="' + e.target.result + '" class="preview-img">';
        localStorage.setItem('2r_ktp_temp', e.target.result);
    };
    reader.readAsDataURL(file);
}

// ===== FUNGSI SIMPAN KTP =====
function simpanKTP() {
    var ktp = localStorage.getItem('2r_ktp_temp');
    if (!ktp) {
        tampilkanToast('Upload KTP dulu!', 'warning');
        return;
    }
    var user = JSON.parse(localStorage.getItem('2r_user'));
    var akun = getDataAkun();
    user.ktp = ktp;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === user.id) {
            akun[i].ktp = ktp;
            break;
        }
    }
    localStorage.setItem('2r_user', JSON.stringify(user));
    simpanDataAkun(akun);
    localStorage.removeItem('2r_ktp_temp');
    tampilkanToast('KTP disimpan!', 'success');
}
</script>

<script>

    html += '<div class="page-header">';
    html += '<h2>Daftar Akun Baru</h2>';

    html += '</div>';
    html += '<div class="card"><div class="card-header">Form Pendaftaran</div>';
    html += '<div class="form-group"><label>Role</label><select id="daftarRole" class="form-input" onchange="updatePreviewId()"><option value="customer">Customer</option><option value="toko">Toko (Verifikasi)</option><option value="ojek">Ojek (Verifikasi)</option><option value="pedagang">Pedagang Pasar</option><option value="staf_admin">Staf Admin</option><option value="staf_owner_ojek">Staf Owner Ojek</option><option value="staf_owner_toko">Staf Owner Toko</option><option value="customer_service">Customer Service</option><option value="sponsor">Sponsor</option></select></div>';
    html += '<div class="form-group"><label>ID Akun (Otomatis)</label><div style="background:#f0f0f0;border:2px solid #ddd;border-radius:8px;padding:12px;"><span id="daftarIdPreview" style="font-weight:600;">' + generateId('customer') + '</span></div></div>';

    html += '<div class="form-group"><label>Password</label><input type="password" id="daftarPassword" class="form-input" placeholder="Password" required></div>';
    html += '<div class="form-group"><label>Nama Lengkap</label><input type="text" id="daftarNama" class="form-input" placeholder="Nama Lengkap" required></div>';
    html += '<button class="btn btn-primary" style="width:100%;" onclick="prosesDaftarAkun()"><i class="fas fa-user-plus"></i> Buat Akun Baru</button></div>';
    contentArea.innerHTML = html;
}

function updatePreviewId() {
    var role = document.getElementById('daftarRole').value;
    document.getElementById('daftarIdPreview').textContent = generateId(role);
}

function prosesDaftarAkun() {
    var role = document.getElementById('daftarRole').value;
    var username = document.getElementById('daftarUsername').value.trim();
    var password = document.getElementById('daftarPassword').value.trim();
    var nama = document.getElementById('daftarNama').value.trim();
    if (!role || !username || !password || !nama) {
        tampilkanToast('Data belum lengkap!', 'warning');
        return;
    }
    if (username.length < 4) {
        tampilkanToast('Username minimal 4 karakter!', 'warning');
        return;
    }
    if (password.length < 6) {
        tampilkanToast('Password minimal 6 karakter!', 'warning');
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].username === username) {
            tampilkanToast('Username sudah digunakan!', 'error');
            return;
        }
    }
    var statusAkun = '';
    if (role === 'toko' || role === 'ojek') {
        statusAkun = 'NONAKTIF (Menunggu Verifikasi)';
    } else {
        statusAkun = 'AKTIF';
    }
    var akunBaru = {
        id: generateId(role),
        role: role,
        username: username,
        password: encodePassword(password),
        nama: nama,
        email: '',
        hp: '',
        alamat: '',
        bank: '',
        rekening: '',
        pemilikRek: '',
        status: statusAkun,
        registeredAt: new Date().toISOString()
    };
    akun.push(akunBaru);
    simpanDataAkun(akun);
    document.getElementById('daftarUsername').value = '';
    document.getElementById('daftarPassword').value = '';
    document.getElementById('daftarNama').value = '';
    updatePreviewId();
    tampilkanToast('Akun ' + role + ' berhasil dibuat! ID: ' + akunBaru.id, 'success');
}
</script>

<script>
// ===== RENDER HALAMAN PERSETUJUAN AKUN =====
function renderPersetujuanAkun() {

    }

            daftar.push(akun[i]);
        }
    }

    if (daftar.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-check-circle" style="color:#4CAF50;"></i><h3>Tidak ada akun menunggu</h3></div>';
    } else {
        html += '<div class="table-container"><table class="table"><thead><tr><th>ID</th><th>Role</th><th>Username</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';

                html += '<span style="color:#888;">Sudah Aktif</span>';
            }

// ===== FUNGSI SETUJUI AKUN =====
function setujuiAkun(id) {
    if (!confirm('Setujui akun ini?')) {
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === id) {
            akun[i].status = 'AKTIF';
            break;
        }
    }
    simpanDataAkun(akun);
    renderPersetujuanAkun();
    tampilkanToast('Akun diaktifkan!', 'success');
}

// ===== FUNGSI BUKA TOLAK AKUN =====
function bukaTolakAkun(id) {
    document.getElementById('tolakIdAkun').value = id;
    bukaModal('modalTolakAkun');
}

// ===== FUNGSI EKSEKUSI TOLAK AKUN =====
function eksekusiTolakAkun() {
    var id = document.getElementById('tolakIdAkun').value;
    var akun = getDataAkun();
    var akunBaru = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id !== id) {
            akunBaru.push(akun[i]);
        }
    }
    simpanDataAkun(akunBaru);
    tutupModal('modalTolakAkun');
    renderPersetujuanAkun();
    tampilkanToast('Akun ditolak!', 'success');
}

// ===== RENDER HALAMAN KELOLA SEMUA AKUN =====
function renderKelolaAkun() {
    var role = localStorage.getItem('2r_user_role');
    if (role !== 'superadmin' && role !== 'staf_admin') {
        tampilkanToast('Anda tidak memiliki akses ke halaman ini!', 'error');
        return;
    }

    var akun = getDataAkun();
    var daftar = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].role !== 'superadmin') {
            daftar.push(akun[i]);
        }
    }
    var contentArea = document.getElementById('mainContent');
    var html = '<div class="page-header"><h2>Kelola Semua Akun</h2><p>';
    if (role === 'superadmin') {
        html += 'Anda dapat mengaktifkan, menonaktifkan (suspen), atau menghapus akun secara permanen.';
    } else {
        html += 'Anda dapat mengaktifkan, menonaktifkan, atau mengajukan penghapusan akun ke SuperAdmin.';
    }
    html += '</p></div><div class="card">';
    if (daftar.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-users-slash"></i><h3>Belum ada akun</h3></div>';
    } else {
        html += '<div class="table-container"><table class="table"><thead><tr><th>No</th><th>ID</th><th>Role</th><th>Username</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < daftar.length; i++) {
            var a = daftar[i];
            var badge = a.status === 'AKTIF' ? 'badge-success' :
                        (a.status === 'NONAKTIF (Menunggu Verifikasi)' ? 'badge-warning' : 'badge-danger');
            var statusText = a.status === 'AKTIF' ? 'AKTIF' :
                            (a.status === 'NONAKTIF (Menunggu Verifikasi)' ? 'Menunggu' : 'Nonaktif');
            html += '<tr><td>' + (i+1) + '</td><td>' + a.id + '</td><td>' + a.role + '</td><td>' + a.username + '</td><td>' + a.nama + '</td><td><span class="badge ' + badge + '">' + statusText + '</span></td><td><div style="display:flex;gap:5px;">';
            if (a.status !== 'AKTIF') {
                html += '<button class="btn btn-success btn-xs" onclick="aktifkanAkun(\'' + a.id + '\')">Aktifkan</button>';
            } else {
                html += '<button class="btn btn-warning btn-xs" onclick="nonaktifkanAkun(\'' + a.id + '\')">Nonaktifkan (Suspen)</button>';
            }
            if (role === 'superadmin') {
                html += '<button class="btn btn-danger btn-xs" onclick="hapusAkun(\'' + a.id + '\')">Hapus</button>';
            } else if (role === 'staf_admin') {
                html += '<button class="btn btn-danger btn-xs" style="background:#FF9800;" onclick="ajukanHapusAkunStaf(\'' + a.id + '\')">Ajukan Hapus</button>';
            }

        }
        html += '</tbody></table></div>';
    }
    html += '</div>';
    contentArea.innerHTML = html;
}

// ===== FUNGSI AKTIFKAN AKUN =====
function aktifkanAkun(id) {
    var role = localStorage.getItem('2r_user_role');
    if (role !== 'superadmin' && role !== 'staf_admin') {
        tampilkanToast('Anda tidak memiliki hak untuk mengaktifkan akun!', 'error');
        return;
    }
    if (!confirm('Aktifkan akun ini?')) {
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === id) {
            akun[i].status = 'AKTIF';
            break;
        }
    }
    simpanDataAkun(akun);
    renderKelolaAkun();
    tampilkanToast('Akun diaktifkan!', 'success');
}

// ===== FUNGSI NONAKTIFKAN AKUN (SUSPEN) =====
function nonaktifkanAkun(id) {
    var role = localStorage.getItem('2r_user_role');
    if (role !== 'superadmin') {
        tampilkanToast('Hanya SuperAdmin yang dapat menonaktifkan (suspen) akun!', 'error');
        return;
    }
    if (!confirm('Nonaktifkan (suspen) akun ini?')) {
        return;
    }
    var akun = getDataAkun();
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === id) {
            akun[i].status = 'NONAKTIF (Disuspen)';
            break;
        }
    }
    simpanDataAkun(akun);
    renderKelolaAkun();
    tampilkanToast('Akun dinonaktifkan (suspen)!', 'success');
}

// ===== FUNGSI HAPUS AKUN (HANYA SUPERADMIN) =====
function hapusAkun(id) {
    var role = localStorage.getItem('2r_user_role');
    if (role !== 'superadmin') {
        tampilkanToast('Hanya SuperAdmin yang dapat menghapus akun permanen!', 'error');
        return;
    }
    if (!confirm('HAPUS permanen akun ini?')) {
        return;
    }
    if (!confirm('KONFIRMASI: Yakin hapus?')) {
        return;
    }
    var akun = getDataAkun();
    var akunBaru = [];
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id !== id) {
            akunBaru.push(akun[i]);
        }
    }
    simpanDataAkun(akunBaru);
    renderKelolaAkun();
    tampilkanToast('Akun dihapus!', 'success');
}

// ===== FUNGSI AJUKAN HAPUS AKUN OLEH STAF ADMIN =====
function ajukanHapusAkunStaf(id) {
    var role = localStorage.getItem('2r_user_role');
    if (role !== 'staf_admin') {
        tampilkanToast('Anda tidak memiliki hak untuk mengajukan penghapusan!', 'error');
        return;
    }
    if (!confirm('Ajukan penghapusan akun ini ke SuperAdmin?')) {
        return;
    }
    var akun = getDataAkun();
    var target = null;
    for (var i = 0; i < akun.length; i++) {
        if (akun[i].id === id) {
            target = akun[i];
            break;
        }
    }
    if (!target) {
        tampilkanToast('Akun tidak ditemukan!', 'error');
        return;
    }
    var pengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_hapus_staf') || '[]');
    pengajuan.push({
        id: Date.now(),
        targetId: target.id,
        targetUsername: target.username,
        targetNama: target.nama,
        targetRole: target.role,
        diajukanOleh: 'Staf Admin',
        status: 'MENUNGGU',
        diajukanPada: new Date().toISOString()
    });
    localStorage.setItem('2r_pengajuan_hapus_staf', JSON.stringify(pengajuan));
    renderKelolaAkun();
    tampilkanToast('Pengajuan penghapusan akun telah dikirim ke SuperAdmin!', 'success');
}
</script>

<script>
function tampilkanDashboard(user) {
    document.getElementById('pageAuth').style.display = 'none';
    document.getElementById('pageDashboard').style.display = 'block';
    document.getElementById('userNama').textContent = user.nama;
    var namaRole = {
        superadmin: 'SuperAdmin',
        customer: 'Customer',
        toko: 'Toko',
        ojek: 'Ojek',
        pedagang: 'Pedagang Pasar',
        staf_admin: 'Staf Admin',
        customer_service: 'Customer Service',
        staf_owner_toko: 'Staf Owner Toko',
        staf_owner_ojek: 'Staf Owner Ojek',
        sponsor: 'Sponsor'
    };
    document.getElementById('roleBadge').textContent = namaRole[user.role] || user.role;
    
    // Render sidebar
    document.getElementById('sidebarContainer').innerHTML = buatSidebarHTML(user.role);
    setupNavigasiSidebar();
    
    // Tampilkan dashboard awal
    renderDashboard();
}

document.addEventListener('DOMContentLoaded', function() {
    inisialisasiSuperAdmin();
    var userData = localStorage.getItem('2r_user');
    if (userData) {
        var user = JSON.parse(userData);
        tampilkanDashboard(user);
    }
    
    document.getElementById('btnLogout').onclick = function() {
    if (confirm('Keluar dari aplikasi?')) {
        localStorage.removeItem('2r_user');
        localStorage.removeItem('2r_user_role');
        location.reload();
    }
};
    
    var modals = document.querySelectorAll('.modal-overlay');
    for (var i = 0; i < modals.length; i++) {
        modals[i].onclick = function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        };
    }
    
    // ===== TAMBAHAN EVENT LISTENER UNTUK RESPONSIVE SIDEBAR =====
    var menuToggle = document.getElementById('menuToggle');
    var sidebar = document.querySelector('.sidebar');
    var sidebarOverlay = document.getElementById('sidebarOverlay');

    if (menuToggle && sidebar && sidebarOverlay) {
        // Fungsi membuka sidebar
        function bukaSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        // Fungsi menutup sidebar
        function tutupSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        // Saat tombol hamburger diklik
        menuToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            if (sidebar.classList.contains('open')) {
                tutupSidebar();
            } else {
                bukaSidebar();
            }
        });

        // Saat overlay diklik, sidebar menutup
        sidebarOverlay.addEventListener('click', function() {
            tutupSidebar();
        });

        // Saat menu sidebar diklik di HP, sidebar otomatis menutup
        document.querySelectorAll('.sidebar-menu-item').forEach(function(item) {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 767) {
                    tutupSidebar();
                }
            });
        });

        // Jika ukuran layar berubah dari HP ke PC, sidebar kembali terbuka
        window.addEventListener('resize', function() {
            if (window.innerWidth > 767) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('active');
            }
        });
    }
    // ===== AKHIR TAMBAHAN =====
});
</script>
